<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="crabcode_logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrabCode IDE</title>
<style>
/* ========== CSS VARIABLES & THEMES ========== */
:root {
  --font-mono: 'Consolas', 'Courier New', monospace;
  --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --transition: 0.25s ease;
  --radius: 8px;
  --radius-sm: 4px;
}

body.dark {
  --bg-primary: #11111b;
  --bg-editor: #1e1e2e;
  --bg-output: #181825;
  --bg-header: #181825;
  --bg-error-panel: #1e1e2e;
  --bg-line-numbers: #181825;
  --bg-button: #313244;
  --bg-button-hover: #45475a;
  --bg-input: #313244;
  --bg-modal: #1e1e2eee;
  --bg-card: #232336;
  --bg-tab: #313244;
  --bg-tab-active: #45475a;
  --border: #313244;
  --border-focus: #89b4fa;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --text-muted: #6c7086;
  --text-line-num: #585b70;
  --color-laranja: #fab387;
  --color-roxo: #cba6f7;
  --color-azul: #89b4fa;
  --color-branco: #cdd6f4;
  --color-vermelho: #f38ba8;
  --color-verde: #a6e3a1;
  --color-amarelo: #f9e2af;
  --color-numero: #f9e2af;
  --color-operador: #94e2d5;
  --color-string-hint: #a6e3a1;
  --scrollbar-thumb: #45475a;
  --scrollbar-track: #1e1e2e;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --output-execute-bg: #181825;
  --output-destaque-bg: #313244;
  --output-destaque-border: #cba6f7;
  --output-dados-header: #313244;
  --output-dados-row: #1e1e2e;
  --output-dados-row-alt: #181825;
  --resize-handle: #45475a;
}

body.light {
  --bg-primary: #eff1f5;
  --bg-editor: #ffffff;
  --bg-output: #f5f5f8;
  --bg-header: #e6e9ef;
  --bg-error-panel: #ffffff;
  --bg-line-numbers: #f5f5f8;
  --bg-button: #dce0e8;
  --bg-button-hover: #ccd0da;
  --bg-input: #e6e9ef;
  --bg-modal: #ffffffee;
  --bg-card: #e6e9ef;
  --bg-tab: #dce0e8;
  --bg-tab-active: #ccd0da;
  --border: #ccd0da;
  --border-focus: #1e66f5;
  --text-primary: #4c4f69;
  --text-secondary: #5c5f77;
  --text-muted: #9ca0b0;
  --text-line-num: #9ca0b0;
  --color-laranja: #d86213;  
  --color-roxo: #8839ef;
  --color-azul: #1e66f5;
  --color-branco: #4c4f69;
  --color-vermelho: #d20f39;
  --color-verde: #40a02b;
  --color-amarelo: #df8e1d;
  --color-numero: #df8e1d;
  --color-operador: #179299;
  --color-string-hint: #40a02b;
  --scrollbar-thumb: #ccd0da;
  --scrollbar-track: #ffffff;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
  --output-execute-bg: #e6e9ef;
  --output-destaque-bg: #e6e9ef;
  --output-destaque-border: #8839ef;
  --output-dados-header: #dce0e8;
  --output-dados-row: #ffffff;
  --output-dados-row-alt: #f5f5f8;
  --resize-handle: #ccd0da;
}

/* ========== RESET & BASE ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-ui);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { opacity: 0.8; }

/* ========== HEADER ========== */
#header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  flex-shrink: 0;
  min-height: 48px;
}

#header .logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  user-select: none;
  white-space: nowrap;
}

#header .logo span { color: var(--color-laranja); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-button);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  cursor: pointer;
  transition: background var(--transition);
  white-space: nowrap;
}

.btn:hover { background: var(--bg-button-hover); }

.btn-run {
  background: #40a02b22;
  border-color: var(--color-verde);
  color: var(--color-verde);
  font-weight: 600;
}

.btn-run:hover { background: #40a02b44; }

.btn-run.flash { animation: runFlash 0.4s ease; }

@keyframes runFlash {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); box-shadow: 0 0 16px var(--color-verde); }
}

.btn-icon {
  padding: 6px 8px;
  font-size: 16px;
  border: none;
  background: transparent;
}

.btn-icon:hover { background: var(--bg-button); }

.saved-indicator {
  font-size: 12px;
  color: var(--color-verde);
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}

.saved-indicator.show { opacity: 1; }

/* ========== TABS ========== */
.tabs {
  display: flex;
  gap: 2px;
  padding: 0 16px;
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab {
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  font-family: var(--font-ui);
  transition: all var(--transition);
}

.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--color-laranja); }

/* ========== MAIN LAYOUT ========== */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

#editor-panel {
  display: flex;
  flex-direction: column;
  min-width: 200px;
  flex: 1;
  overflow: hidden;
}

#resize-handle {
  width: 5px;
  cursor: col-resize;
  background: var(--resize-handle);
  flex-shrink: 0;
  transition: background var(--transition);
  position: relative;
}

#resize-handle:hover, #resize-handle.active {
  background: var(--color-azul);
}

#output-panel {
  display: flex;
  flex-direction: column;
  min-width: 200px;
  width: 40%;
  overflow: hidden;
  background: var(--bg-output);
}

/* ========== EDITOR ========== */
.editor-container {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

.line-numbers {
  width: 48px;
  padding: 12px 8px 12px 0;
  text-align: right;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-line-num);
  background: var(--bg-line-numbers);
  border-right: 1px solid var(--border);
  overflow: hidden;
  user-select: none;
  flex-shrink: 0;
}

.editor-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.highlight-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
  white-space: pre;
  overflow: auto;
  pointer-events: none;
  color: transparent;
}

#code-editor {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.6;
  background: transparent;
  color: transparent;
  caret-color: var(--text-primary);
  border: none;
  outline: none;
  resize: none;
  white-space: pre;
  overflow: auto;
  z-index: 2;
  -webkit-text-fill-color: transparent;
}

#code-editor::selection {
  background: rgba(137,180,250,0.3);
  -webkit-text-fill-color: transparent;
}

.editor-wrapper .background-fill {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg-editor);
  z-index: 0;
}

/* Error underline */
.token-erro {
  text-decoration: wavy underline;
  text-decoration-color: var(--color-vermelho);
  position: relative;
}

.error-line {
  background: rgba(243,139,168,0.08);
  display: inline;
}

/* ========== ERROR PANEL ========== */
#error-panel {
  border-top: 1px solid var(--border);
  background: var(--bg-error-panel);
  flex-shrink: 0;
  max-height: 180px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#error-panel.collapsed { max-height: 32px; }

.error-panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  user-select: none;
  flex-shrink: 0;
}

.error-panel-header .count {
  background: var(--color-vermelho);
  color: #fff;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}

.error-panel-header .count.zero {
  background: var(--color-verde);
}

.error-list {
  overflow-y: auto;
  padding: 4px 0;
  flex: 1;
}

.error-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}

.error-item:hover { background: var(--bg-button); }

.error-item .error-icon { color: var(--color-vermelho); flex-shrink: 0; }
.error-item .error-line-num { color: var(--color-azul); flex-shrink: 0; font-family: var(--font-mono); font-size: 12px; }
.error-item .error-msg { color: var(--text-secondary); }

/* ========== OUTPUT PANEL ========== */
.output-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
}

.output-header .title { flex: 1; }

.output-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.output-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 14px;
  text-align: center;
  gap: 8px;
}

.output-empty .crab { font-size: 48px; opacity: 0.4; }

/* Output item types */
.output-item { animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.output-execute {
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 6px 10px;
  background: var(--output-execute-bg);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--color-verde);
  color: var(--text-primary);
  white-space: pre-wrap;
}

.output-texto {
  font-size: 14px;
  padding: 6px 0;
  color: var(--text-primary);
  line-height: 1.5;
}

.output-destaque {
  padding: 12px 16px;
  background: var(--output-destaque-bg);
  border: 1px solid var(--output-destaque-border);
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.output-apresentacao {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-primary);
  border-left: 3px solid var(--color-azul);
}

.output-apresentacao .label {
  font-weight: 600;
  color: var(--color-azul);
}

.output-dados {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border-radius: var(--radius);
  overflow: hidden;
}

.output-dados th {
  background: var(--output-dados-header);
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--text-primary);
}

.output-dados td {
  padding: 6px 12px;
  color: var(--text-secondary);
}

.output-dados tr:nth-child(even) td { background: var(--output-dados-row-alt); }
.output-dados tr:nth-child(odd) td { background: var(--output-dados-row); }

.output-error {
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 8px 12px;
  background: rgba(243,139,168,0.1);
  border: 1px solid var(--color-vermelho);
  border-radius: var(--radius-sm);
  color: var(--color-vermelho);
}

.output-tabela {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  border-radius: var(--radius);
  overflow: hidden;
}

.output-tabela th {
  background: var(--output-dados-header);
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--color-azul);
  border-bottom: 2px solid var(--border);
}

.output-tabela th:first-child {
  color: var(--text-muted);
  font-weight: 500;
}

.output-tabela td {
  padding: 6px 12px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}

.output-tabela tr:nth-child(even) td { background: var(--output-dados-row-alt); }
.output-tabela tr:nth-child(odd) td { background: var(--output-dados-row); }

.output-grafico-wrap {
  width: 100%;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px;
  box-sizing: border-box;
}

.output-grafico-wrap canvas {
  width: 100%;
  height: auto;
  display: block;
}

.output-grafico-legend {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}

.output-grafico-legend span {
  display: flex;
  align-items: center;
  gap: 5px;
}

.output-grafico-legend .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}

/* ========== TUTORIAL/DOCS PANEL ========== */
#tutorial-panel, #docs-panel {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#tutorial-panel.active, #docs-panel.active {
  display: flex;
}

#scripts-panel {
  flex: 1;
  display: none;
  overflow-y: auto;
  background: var(--bg-primary);
}
#scripts-panel.active {
  display: block;
}

/* ========== LIBS PANEL ========== */
#libs-panel {
  flex: 1;
  display: none;
  overflow-y: auto;
  background: var(--bg-primary);
}
#libs-panel.active {
  display: block;
}
#dados-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  flex-wrap: wrap;
}
#dados-list {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.csv-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  border-left: 3px solid var(--color-azul);
}
.csv-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.csv-card-key {
  font-family: monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-azul);
  background: rgba(137,180,250,0.1);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.csv-card-title {
  font-size: 13px;
  color: var(--text-primary);
  flex: 1;
}
.csv-card-cols {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-family: monospace;
  line-height: 1.6;
}
.csv-card-cols span {
  display: inline-block;
  background: var(--bg-main);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 6px;
  margin: 2px 3px 2px 0;
  color: var(--color-verde);
}
.csv-card-actions {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.csv-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 48px 24px;
  font-size: 14px;
  line-height: 1.8;
}

#libs-search {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  padding: 7px 12px;
  outline: none;
  transition: border-color var(--transition);
}
#libs-search:focus { border-color: var(--border-focus); }
#libs-list {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.lib-card {
  background: var(--bg-editor);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.lib-card.selo-estrelada { border: 2px solid #f5a623; box-shadow: 0 0 12px rgba(245,166,35,0.15); }
.lib-card.selo-honrosa   { border: 2px solid #7c8ef2; }
.lib-card.selo-recomendada { border-left: 3px solid #4caf50; }
.lib-card.selo-meta { border: 2px solid #94a3b8; box-shadow: 0 0 10px rgba(148,163,184,0.12); }
.lib-card.custom { border-left: 3px solid var(--color-azul); }
.lib-selo {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  line-height: 1.4;
  flex-shrink: 0;
  white-space: nowrap;
}
.lib-selo.estrelada   { background: rgba(245,166,35,0.15); color: #f5a623; }
.lib-selo.honrosa     { background: rgba(124,142,242,0.15); color: #7c8ef2; }
.lib-selo.recomendada { background: rgba(76,175,80,0.12); color: #4caf50; }
.lib-selo.meta        { background: rgba(148,163,184,0.12); color: #94a3b8; }
.lib-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.lib-card-meta { flex: 1; min-width: 0; }
.lib-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 4px;
}
.lib-card-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 0;
  line-height: 1.5;
}
.lib-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  background: var(--bg-button);
  color: var(--color-laranja);
  border: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}
.lib-func-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.lib-func {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-button);
  color: var(--text-secondary);
  cursor: default;
}
.lib-func:hover {
  color: var(--text-primary);
  background: var(--bg-button-hover);
}
.lib-card-example {
  padding: 10px 16px;
}
.lib-card-example pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin: 6px 0 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-primary);
  overflow-x: auto;
}
.lib-card-actions {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  background: var(--bg-line-numbers);
}

#editor-panel { display: none; }
#editor-panel.active { display: flex; }

.doc-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.doc-content h1 {
  font-size: 28px;
  margin-bottom: 8px;
  color: var(--color-laranja);
}

.doc-content h2 {
  font-size: 20px;
  margin: 24px 0 8px;
  color: var(--color-roxo);

}

.doc-content .activity-box.complete::before {

  font-weight: 600;

}
.doc-content details.solution summary::before { content: '▶ '; font-size: 10px; }

.doc-content details.solution pre {

}

.doc-content .module-badge {

}

.badge-laranja { background: rgba(250,179,135,0.2); color: var(--color-laranja); }
.badge-roxo { background: rgba(203,166,247,0.2); color: var(--color-roxo); }
.badge-azul { background: rgba(137,180,250,0.2); color: var(--color-azul); }

.doc-content table {

}

}

.doc-content .tip {

}

.doc-content .warning {

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  #main { flex-direction: column; }

/* ========== TOOLTIP ========== */
.error-tooltip {
  position: absolute;
  background: var(--bg-card);
  border: 1px solid var(--color-vermelho);

  border-radius: var(--radius-sm);
  font-size: 12px;
  font-family: var(--font-ui);
  z-index: 1000;

}
/* ========== SCRIPTS PANEL ========== */
#scripts-toolbar {
  display: flex;
  gap: 10px;
  align-items: center;

  top: 0;
  z-index: 10;
}
#scripts-search {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);

  padding: 7px 12px;

}

#scripts-list {
  padding: 20px;

  flex-direction: column;
  gap: 20px;
}
#scripts-list:empty::after {
  content: 'Nenhum script salvo ainda. Clique em "+ Novo Script" para começar.';

  text-align: center;
  margin-top: 40px;
}
.script-card {

  overflow: hidden;
}
.script-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.script-card-meta { flex: 1; min-width: 0; }
.script-card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.script-card-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 0;
  line-height: 1.5;
}
.script-card-date {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.script-card-actions {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-line-numbers);
}
.script-btn {
  background: var(--bg-button);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: var(--font-ui);
  transition: all var(--transition);
}
.script-btn:hover { background: var(--bg-button-hover); color: var(--text-primary); }
.script-btn.delete:hover { border-color: var(--color-vermelho); color: var(--color-vermelho); }
.script-btn.copied { color: var(--color-verde); border-color: var(--color-verde); }
.script-code-block {
  position: relative;
  padding: 14px 16px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
}

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-box {
  background: var(--bg-modal);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: min(540px, 95vw);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 12px 0 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.modal-input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  box-sizing: border-box;
  transition: border-color var(--transition);
}
.modal-input:focus { border-color: var(--border-focus); }
.modal-textarea { resize: vertical; min-height: 60px; }
.modal-code {
  font-family: var(--font-mono);
  font-size: 12px;
  min-height: 160px;
  resize: vertical;
}

/* ==================== AUTOCOMPLETE ==================== */
.autocomplete-popup {
  display: none;
  position: absolute;
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  max-height: 260px;
  overflow-y: auto;
  overflow-x: hidden;
  min-width: 220px;
  max-width: 420px;
  font-family: var(--font-mono);
  font-size: 12px;
  scrollbar-width: thin;
}
.autocomplete-popup::-webkit-scrollbar { width: 5px; }
.autocomplete-popup::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.autocomplete-popup.visible { display: block; }
.autocomplete-item {
  padding: 4px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-primary);
  border-bottom: 1px solid rgba(128,128,128,0.08);
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover,
.autocomplete-item.selected {
  background: var(--bg-input);
  color: var(--color-laranja);
}
.autocomplete-item .ac-badge {

}
.autocomplete-item .ac-badge.kw { background: var(--color-laranja); color: #1e1e2e; }
.autocomplete-item .ac-badge.var { background: var(--color-azul); color: #1e1e2e; }
.autocomplete-item .ac-badge.arr { background: var(--color-roxo); color: #1e1e2e; }
.autocomplete-item .ac-badge.obj { background: var(--color-verde); color: #1e1e2e; }
.autocomplete-item .ac-badge.fn { background: var(--color-vermelho); color: #1e1e2e; }
.autocomplete-item .ac-badge.fmt { background: var(--color-numero); color: #1e1e2e; }
.autocomplete-item .ac-badge.lib { background: var(--color-operador); color: #1e1e2e; }
.autocomplete-item .ac-badge.snip { background: var(--text-muted); color: #1e1e2e; }
.autocomplete-item .ac-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.autocomplete-item .ac-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.autocomplete-item .ac-label .ac-match {
  color: var(--color-laranja);
  font-weight: 700;
}
.autocomplete-item .ac-desc {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.autocomplete-footer {
  padding: 3px 10px;
  font-size: 10px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  text-align: right;
  background: var(--bg-card);
  position: sticky;
  bottom: 0;
}

/* ==================== PRESENTATION MODE ==================== */
body.presentation #header,
body.presentation .tabs,
body.presentation #editor-panel,
body.presentation #resize-handle,
body.presentation #error-panel,

}
.btn-presentation-exit {

  top: 12px;
  right: 12px;

  border: 1px solid var(--border);
  border-radius: var(--radius-sm);

/* ==================== EXPORT BUTTONS ==================== */

      <textarea id="csv-modal-content" class="modal-input modal-code" placeholder="mes,vendas,lucro&#10;jan,1200,340&#10;fev,980,210&#10;mar,1450,520" spellcheck="false" style="height:180px;font-size:12px;"></textarea>
      <div id="csv-modal-preview" style="margin-top:8px;font-size:11px;color:var(--text-muted);font-family:monospace;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" onclick="closeCsvModal()">Cancelar</button>
        <button class="btn btn-run" onclick="saveCsvFromModal()">Salvar Dataset</button>

    </div>

      <button class="btn" onclick="clearOutput()" style="padding:4px 8px;font-size:12px">Limpar</button>
    </div>
    <div class="output-body" id="output-body">
      <div class="output-empty">
        <div class="crab"><img src="crabcode_logo.png" alt="CrabCode" style="width:48px;height:48px;"></div>
