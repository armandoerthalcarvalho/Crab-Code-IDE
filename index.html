// ==================== SCRIPTS ENGINE ====================
const SCRIPTS_KEY = 'crabcode_scripts';

function loadScripts() {
  try { return JSON.parse(localStorage.getItem(SCRIPTS_KEY) || '[]'); }
  catch { return []; }
}

function saveScripts(scripts) {
  localStorage.setItem(SCRIPTS_KEY, JSON.stringify(scripts));
}

function openScriptModal() {
  document.getElementById('modal-title').value = '';
  document.getElementById('modal-desc').value = '';
  document.getElementById('modal-code').value = '';
  document.getElementById('script-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-title').focus(), 50);
}

function closeScriptModal() {
  document.getElementById('script-modal').style.display = 'none';
}

function saveScript() {
  const title = document.getElementById('modal-title').value.trim();
  const desc  = document.getElementById('modal-desc').value.trim();
  const code  = document.getElementById('modal-code').value;

  if (!title) {
    document.getElementById('modal-title').focus();
    document.getElementById('modal-title').style.borderColor = 'var(--color-vermelho)';
    setTimeout(() => document.getElementById('modal-title').style.borderColor = '', 1500);
    return;
  }
  if (!code.trim()) {
    document.getElementById('modal-code').focus();
    document.getElementById('modal-code').style.borderColor = 'var(--color-vermelho)';
    setTimeout(() => document.getElementById('modal-code').style.borderColor = '', 1500);
    return;
  }

  const scripts = loadScripts();
  scripts.push({ id: Date.now(), title, desc, code, createdAt: new Date().toISOString() });
  saveScripts(scripts);
  closeScriptModal();
  renderScripts();
}

function deleteScript(id) {
  const scripts = loadScripts().filter(s => s.id !== id);
  saveScripts(scripts);
  renderScripts();
}

function confirmDeleteScript(btn) {
  const id = Number(btn.dataset.id);
  deleteScript(id);
}

function copyScriptCode(id, btn) {
  const scripts = loadScripts();
  const s = scripts.find(s => s.id === id);
  if (!s) return;
  const done = () => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar código'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(s.code).then(done).catch(() => fallbackCopy(s.code, done));
  } else {
    fallbackCopy(s.code, done);
  }
}

function fallbackCopy(text, done) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); done(); } catch(e) {}
  document.body.removeChild(ta);
}

function loadIntoEditor(id) {
  const scripts = loadScripts();
  const s = scripts.find(s => s.id === id);
  if (!s) return;
  document.getElementById('code-editor').value = s.code;
  updateEditor();
  saveCode();
  switchTab('editor');
}

function formatScriptDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' })
       + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function highlightCodeStatic(source) {
  // Runs the Lexer and returns syntax-highlighted HTML (read-only, no editing)
  try {
    const lexer = new Lexer(source);
    const { tokens } = lexer.tokenize();
    let html = '';
    let pos = 0;
    const lines = source.split('\n');
    for (const line of lines) {
      // Get tokens for this line
      html += '<div class="hl-line">';
      let linePos = 0;
      const lineTokens = tokens.filter(t => t.line === (lines.indexOf(line) + 1) && t.type !== 'NEWLINE');
      // Rebuild line char-by-char using token positions
      // Simpler: just re-lex each line
      html += highlightLine(line) + '</div>';
    }
    return html;
  } catch {
    return `<pre>${escapeHtml(source)}</pre>`;
  }
}

function highlightLine(line) {
  // Use the existing highlight engine on a single line
  const lexer = new Lexer(line);
  const { tokens } = lexer.tokenize();

  const colorMap = {
    laranja: 'var(--color-laranja)',
    roxo: 'var(--color-roxo)',
    azul: 'var(--color-azul)',
    branco: 'var(--color-branco)',
    vermelho: 'var(--color-vermelho)',
    numero: 'var(--color-numero)',
    operador: 'var(--color-operador)',
    verde: 'var(--color-verde)',
    string: 'var(--color-string-hint)',
    comment: 'var(--text-muted)',
    ponto: 'var(--color-branco)',
  };

  let result = '';
  let cursor = 0;
  for (const t of tokens) {
    if (t.type === 'NEWLINE' || t.type === 'WS') {
      result += escapeHtml(t.value || '');
      cursor += (t.value || '').length;
      continue;
    }
    const color = colorMap[t.module] || colorMap['branco'];
    const val = escapeHtml(t.value || '');
    result += `<span style="color:${color}">${val}</span>`;
    cursor += (t.value || '').length;
  }
  // Append any trailing chars (spaces)
  return result;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderScripts() {
  const query = (document.getElementById('scripts-search')?.value || '').toLowerCase();
  const scripts = loadScripts();
  const list = document.getElementById('scripts-list');
  if (!list) return;

  const filtered = scripts.filter(s => {
    if (!query) return true;
    return s.title.toLowerCase().includes(query)
        || (s.desc || '').toLowerCase().includes(query)
        || s.code.toLowerCase().includes(query);
  });

  if (filtered.length === 0) {
    list.innerHTML = query
      ? `<div style="color:var(--text-muted);font-size:13px;text-align:center;margin-top:40px">Nenhum script encontrado para "<strong>${escapeHtml(query)}</strong>"</div>`
      : '';
    return;
  }

  list.innerHTML = '';
  for (const s of filtered) {
    const card = document.createElement('div');
    card.className = 'script-card';

    const codeLines = s.code.split('\n').map(line => {
      return `<div class="hl-line">${highlightLine(line) || '&nbsp;'}</div>`;
    }).join('');

    card.innerHTML = `
      <div class="script-card-header">
        <div class="script-card-meta">
          <p class="script-card-title">${escapeHtml(s.title)}</p>
          ${s.desc ? `<p class="script-card-desc">${escapeHtml(s.desc)}</p>` : ''}
        </div>
        <span class="script-card-date">${formatScriptDate(s.createdAt)}</span>
      </div>
      <div class="script-card-actions">
        <button class="script-btn" onclick="copyScriptCode(${s.id}, this)">Copiar código</button>
        <button class="script-btn" onclick="loadIntoEditor(${s.id})">Abrir no editor</button>
        <button class="script-btn delete" data-id="${s.id}" onclick="confirmDeleteScript(this)">Excluir</button>
      </div>
      <div class="script-code-block">${codeLines}</div>
    `;
    list.appendChild(card);
  }
}

// ==================== LIBS UI ====================
function renderLibs() {
  const query = (document.getElementById('libs-search')?.value || '').toLowerCase();
  const all = CrabLibRegistry.getAll();
  const list = document.getElementById('libs-list');
  if (!list) return;

  const entries = Object.values(all).filter(lib => {
    if (!query) return true;
    return lib.title.toLowerCase().includes(query)
        || lib.key.toLowerCase().includes(query)
        || lib.description.toLowerCase().includes(query)
        || (lib.functions || []).some(f => f.name.toLowerCase().includes(query) || f.desc.toLowerCase().includes(query));
  });

  // Sort by selo priority: estrelada > honrosa > recomendada > meta > sem selo
  const seloPriority = { estrelada: 0, honrosa: 1, recomendada: 2, meta: 3 };
  entries.sort((a, b) => {
    const pa = a.selo ? (seloPriority[a.selo] ?? 4) : 4;
    const pb = b.selo ? (seloPriority[b.selo] ?? 4) : 4;
    return pa - pb;
  });

  const seloLabels = {
    estrelada:   '⭐ Estrelada',
    honrosa:     '🏅 Menção Honrosa',
    recomendada: '👍 Recomendada',
    meta:        '🎙️ Meta',
  };

  if (entries.length === 0) {
    list.innerHTML = query
      ? `<div style="color:var(--text-muted);font-size:13px;text-align:center;margin-top:40px">Nenhuma biblioteca encontrada para "<strong>${escapeHtml(query)}</strong>"</div>`
      : '<div style="color:var(--text-muted);font-size:13px;text-align:center;margin-top:40px">Nenhuma biblioteca disponível.</div>';
    return;
  }

  list.innerHTML = '';
  for (const lib of entries) {
    const isCustom = !CrabLibRegistry.official[lib.key];
    const seloClass = lib.selo ? ` selo-${lib.selo}` : '';
    const card = document.createElement('div');
    card.className = 'lib-card' + (isCustom ? ' custom' : '') + seloClass;
    if (lib.selo) card.dataset.selo = lib.selo;

    const seloHtml = lib.selo ? `<span class="lib-selo ${lib.selo}">${seloLabels[lib.selo]}</span>` : '';

    const funcsHtml = (lib.functions || []).map(f =>
      `<span class="lib-func" title="${escapeHtml(f.desc)}">${escapeHtml(f.name)}(${escapeHtml(f.params)})</span>`
    ).join('');

    const exampleLines = (lib.example || '').split('\n');
    const exampleHtml = exampleLines.map(line =>
      `<div class="hl-line">${highlightLine(line) || '&nbsp;'}</div>`
    ).join('');

    card.innerHTML = `
      <div class="lib-card-header">
        <div class="lib-card-meta">
          <p class="lib-card-title">${escapeHtml(lib.title)}${seloHtml ? ' ' + seloHtml : ''}</p>
          <p class="lib-card-desc">${escapeHtml(lib.description)}</p>
        </div>
        <span class="lib-badge">importe ${escapeHtml(lib.key)}</span>
      </div>
      ${funcsHtml ? `<div class="lib-func-list">${funcsHtml}</div>` : ''}
      ${lib.dependencies ? `<div class="lib-func-list"><span class="lib-func" style="color:var(--color-laranja)">Inclui: ${lib.dependencies.join(', ')}</span></div>` : ''}
      ${lib.example ? `
        <div class="lib-card-example">
          <div class="example-label">Exemplo</div>
          <pre>${exampleHtml}</pre>
        </div>
      ` : ''}
      <div class="lib-card-actions">
        <button class="script-btn" onclick="copyLibImport('${lib.key}', this)">Copiar importe</button>
        ${lib.example ? `<button class="script-btn" onclick="copyLibExample('${lib.key}', this)">Copiar exemplo</button>` : ''}
        ${isCustom ? `<button class="script-btn delete" onclick="deleteCustomLibUI('${lib.key}')">Excluir</button>` : ''}
      </div>
    `;
    list.appendChild(card);
  }
}

function scrollToMeta() {
  const first = document.querySelector('#libs-list [data-selo="meta"]');
  if (!first) return;
  first.scrollIntoView({ behavior: 'smooth', block: 'start' });
  first.style.outline = '2px solid #94a3b8';
  first.style.outlineOffset = '3px';
  setTimeout(() => { first.style.outline = ''; first.style.outlineOffset = ''; }, 1800);
}

function copyLibImport(key, btn) {
  navigator.clipboard.writeText('importe ' + key).then(() => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar importe'; btn.classList.remove('copied'); }, 1500);
  });
}

function copyLibExample(key, btn) {
  const lib = CrabLibRegistry.get(key);
  if (!lib || !lib.example) return;
  navigator.clipboard.writeText(lib.example).then(() => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar exemplo'; btn.classList.remove('copied'); }, 1500);
  });
}

function openLibModal() {
  document.getElementById('lib-modal-key').value = '';
  document.getElementById('lib-modal-title').value = '';
  document.getElementById('lib-modal-desc').value = '';
  document.getElementById('lib-modal-code').value = '';
  document.getElementById('lib-modal').style.display = 'flex';
}

function closeLibModal() {
  document.getElementById('lib-modal').style.display = 'none';
}

function saveLibFromModal() {
  const key = document.getElementById('lib-modal-key').value.trim().replace(/\s+/g, '_').toLowerCase();
  const title = document.getElementById('lib-modal-title').value.trim();
  const desc = document.getElementById('lib-modal-desc').value.trim();
  const code = document.getElementById('lib-modal-code').value;

  if (!key) return alert('Preencha a chave de importação.');
  if (!title) return alert('Preencha o título.');
  if (!code.trim()) return alert('Escreva o código CrabCode da biblioteca.');
  if (CrabLibRegistry.official[key]) return alert(`"${key}" é o nome de uma biblioteca oficial. Escolha outro nome.`);
  if (!/^[a-zA-ZÀ-ÿ_][a-zA-ZÀ-ÿ0-9_]*$/.test(key)) return alert('A chave deve conter apenas letras, números e _');

  const result = CrabLibRegistry.compileCustomLib(code);
  if (result.error) return alert('Erro ao compilar a biblioteca:\n' + result.error);

  const lib = {
    key,
    title,
    description: desc || 'Biblioteca personalizada',
    exports: result.exports,
    functions: result.exports.map(name => ({ name, params: '...', desc: 'Definido pelo usuário' })),
    jsCode: result.jsCode,
    example: 'importe ' + key,
  };

  CrabLibRegistry.saveCustomLib(lib);
  closeLibModal();
  renderLibs();
  scheduleHighlight();
}

function deleteCustomLibUI(key) {
  if (!confirm(`Excluir a biblioteca "${key}"?`)) return;
  CrabLibRegistry.deleteCustomLib(key);
  renderLibs();
}

  // ── Presentation formats ──
  FORMAT_DATA: [

  SNIPPETS: [

    { label: 'defina como funcao',      insert: 'defina nome como funcao(params)\n  execute resultado\nfim', desc: 'Template: declarar função' },

    { label: 'altere enquanto',         insert: 'altere nome para expr enquanto cond',         desc: 'Template: alterar enquanto condição' },
    { label: 'apresente em texto',      insert: 'apresente expressao em texto',                desc: 'Template: apresentar como texto' },
    { label: 'apresente em grafico',    insert: 'apresente dados em grafico',                  desc: 'Template: apresentar como gráfico' },
    { label: 'apresente em tabela',     insert: 'apresente dados em tabela',                   desc: 'Template: apresentar como tabela' },
    { label: 'apresente em destaque',   insert: 'apresente expressao em destaque',             desc: 'Template: apresentar com destaque' },
    { label: 'apresente em estatisticas', insert: 'apresente dados em estatisticas',           desc: 'Template: exibir estatísticas' },
    { label: 'execute loop',            insert: 'execute loop(i, 1, 10)\n  execute i\nfim',    desc: 'Template: loop com contador' },
    { label: 'importe biblioteca',      insert: 'importe nome_biblioteca',                    desc: 'Template: importar biblioteca' },
  ],

  init() {
    this.popup = document.getElementById('autocomplete-popup');

    // ── Keydown on editor: navigation + trigger ──
    codeEditor.addEventListener('keydown', (e) => {
      // Ctrl+Space = force trigger
      if (e.ctrlKey && e.key === ' ') {
        e.preventDefault();
        this.trigger(true);
        return;
      }
      if (!this.active) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        this.moveSelection(1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        this.moveSelection(-1);
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        if (this.items.length > 0 && this.selectedIndex >= 0) {
          e.preventDefault();
          e.stopImmediatePropagation();
          this.accept();
        } else {
          this.hide();
        }
      } else if (e.key === 'Escape') {
        e.preventDefault();
        this.hide();
      }
    });

    // ── Input: auto-trigger as user types ──
    codeEditor.addEventListener('input', () => {
      clearTimeout(this._debounceTimer);
      this._debounceTimer = setTimeout(() => {
        const pos = codeEditor.selectionStart;
        const text = codeEditor.value;
        // Find current word length
        let start = pos;
        while (start > 0 && /[a-zA-ZÀ-ÿ0-9_]/.test(text[start - 1])) start--;
        const wordLen = pos - start;
        if (wordLen >= 2) {
          this.trigger(false);
        } else if (this.active) {
          // Re-trigger if already open (to filter/update)
          this.trigger(false);
        }
      }, 80);
    });

    // Hide on click outside
    document.addEventListener('click', (e) => {
      if (!this.popup.contains(e.target) && e.target !== codeEditor) {
        this.hide();
      }
    });

    // Hide on scroll
    codeEditor.addEventListener('scroll', () => { this.hide(); });
  },

  // Measure actual monospace character width using canvas
  measureCharWidth() {
    if (this._charWidth) return this._charWidth;
    const style = getComputedStyle(codeEditor);
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = style.fontSize + ' ' + style.fontFamily;
    this._charWidth = ctx.measureText('M').width;
    return this._charWidth;
  },

  // ── Get context: what's the command at the start of the current line? ──
  getLineContext() {
    const pos = codeEditor.selectionStart;
    const text = codeEditor.value;
    // Get current line up to cursor
    const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
    const lineToCursor = text.substring(lineStart, pos).trimStart().toLowerCase();

    // Detect if right after "em " → suggest formats
    if (/\bem\s+\S*$/.test(lineToCursor)) return 'format';
    // Detect if right after "importe " → suggest library names
    if (/^importe\s+\S*$/.test(lineToCursor)) return 'import';
    // Detect if line starts with apresente ... em → suggest formats
    if (/^apresente\s+.+\s+em\s+\S*$/.test(lineToCursor)) return 'format';

    return 'general';
  },

  trigger(forced) {
    const pos = codeEditor.selectionStart;
    const text = codeEditor.value;

    // ── Find current word (supports multi-word scanning for builtins) ──
    let start = pos;
    while (start > 0 && /[a-zA-ZÀ-ÿ0-9_]/.test(text[start - 1])) {
      start--;
    }
    let word = text.substring(start, pos).toLowerCase();
    this.currentWord = word;
    this.wordStart = start;

    // For multi-word builtins, also try scanning further back across one space
    let multiWord = '';
    let multiStart = start;
    if (start > 0 && text[start - 1] === ' ') {
      let s2 = start - 1;
      while (s2 > 0 && /[a-zA-ZÀ-ÿ0-9_]/.test(text[s2 - 1])) s2--;
      const prevWord = text.substring(s2, start - 1).toLowerCase();
      if (prevWord) {
        multiWord = prevWord + ' ' + word;
        multiStart = s2;
      }
    }

    const context = this.getLineContext();

    if (word.length === 0 && !forced) {
      this.hide();
      return;
    }

    this.buildSuggestions(word, multiWord, multiStart, context, forced);

    if (this.items.length === 0) {
      this.hide();
      return;
    }

    this.selectedIndex = 0;
    this.render();
    this.position(start);
    this.popup.classList.add('visible');
    this.active = true;
  },

  // ── Fuzzy matching: prefix match or contains match ──
  matchScore(candidate, query) {
    if (!query) return 1; // Show all when empty query
    const c = candidate.toLowerCase();
    const q = query.toLowerCase();
    if (c.startsWith(q)) return 3;   // Prefix match = best
    if (c.includes(q)) return 2;     // Contains = good
    // Simple fuzzy: all query chars appear in order
    let qi = 0;
    for (let ci = 0; ci < c.length && qi < q.length; ci++) {
      if (c[ci] === q[qi]) qi++;
    }
    if (qi === q.length) return 1;    // Fuzzy = ok
    return 0;                          // No match
  },

  buildSuggestions(prefix, multiWord, multiStart, context, forced) {
    const suggestions = [];
    const seen = new Set();

    const addItem = (label, type, desc, score, insertText) => {
      if (seen.has(label)) return;
      seen.add(label);
      suggestions.push({ label, type, desc: desc || '', score, insert: insertText || null });
    };

    // ── Context: format suggestions after "em" ──
    if (context === 'format') {
      for (const f of this.FORMAT_DATA) {
        const s = this.matchScore(f.label, prefix);
        if (s > 0 || forced) addItem(f.label, 'fmt', f.desc, s || 1);
      }
      this.items = suggestions.sort((a, b) => b.score - a.score).slice(0, 30);
      return;
    }

    // ── Context: library name suggestions after "importe" ──
    if (context === 'import') {
      if (CrabLibRegistry && CrabLibRegistry.official) {
        for (const key of Object.keys(CrabLibRegistry.official)) {
          const s = this.matchScore(key, prefix);
          if (s > 0 || forced) {
            const lib = CrabLibRegistry.official[key];
            addItem(key, 'lib', lib.title || key, s || 1);
          }
        }
      }
      // Also check custom libs
      try {
        const custom = JSON.parse(localStorage.getItem('crabcode_custom_libs') || '[]');
        for (const lib of custom) {
          const s = this.matchScore(lib.key, prefix);
          if (s > 0 || forced) addItem(lib.key, 'lib', lib.title || lib.key, s || 1);
        }
      } catch(e) {}
      // CSV datasets
      try {
        for (const ds of getCsvDatasets()) {
          const s = this.matchScore(ds.key, prefix);
          if (s > 0 || forced) addItem(ds.key, 'arr', `📊 ${ds.title || 'Dataset CSV'} · ${ds.columns?.length || 0} colunas`, s || 1);
        }
      } catch(e) {}
      this.items = suggestions.sort((a, b) => b.score - a.score).slice(0, 40);
      return;
    }

    // ── General context ──

    // Multi-word builtins first (check if multi-word prefix matches)
    if (multiWord) {
      for (const bi of this.BUILTIN_FNS) {
        const s = this.matchScore(bi.label, multiWord);
        if (s > 0) {
          if (!seen.has(bi.label)) {
            seen.add(bi.label);
            suggestions.push({ label: bi.label, type: 'fn', desc: bi.desc, score: s + 5, insert: null, wordStart: multiStart });
          }
        }
      }
    }

    // Single-word builtins
    for (const bi of this.BUILTIN_FNS) {
      if (seen.has(bi.label)) continue;
      const s = this.matchScore(bi.label, prefix);
      if (s > 0 || (forced && prefix.length === 0)) addItem(bi.label, 'fn', bi.desc, s || 1);
    }

    // Keywords
    for (const kd of this.KEYWORD_DATA) {
      const s = this.matchScore(kd.label, prefix);
      if (s > 0 || (forced && prefix.length === 0)) addItem(kd.label, 'kw', kd.desc, s || 1);
    }

    // Snippets
    for (const sn of this.SNIPPETS) {
      const s = this.matchScore(sn.label, prefix);
      if (s > 0) {
        if (!seen.has(sn.label)) {
          seen.add(sn.label);
          suggestions.push({ label: sn.label, type: 'snip', desc: sn.desc, score: s, insert: sn.insert });
        }
      }
    }

    // ── Dynamic: lexer-declared symbols ──
    try {
      const source = codeEditor.value;
      const lexer = new Lexer(source);
      lexer.tokenize();

      for (const v of lexer.declaredVars) {
        const s = this.matchScore(v, prefix);
        if (s > 0 || (forced && prefix.length === 0)) {
          if (lexer.declaredArrays.has(v)) {
            addItem(v, 'arr', 'Array declarado', s || 1);
          } else if (lexer.declaredObjects.has(v)) {
            addItem(v, 'obj', 'Objeto declarado', s || 1);
          } else {
            addItem(v, 'var', 'Variável declarada', s || 1);
          }
        }
      }

      // Declared functions
      const funcPattern = /defina\s+(\w+)\s+como\s+funcao\s*\(([^)]*)\)/g;
      let m;
      while ((m = funcPattern.exec(source)) !== null) {
        const fn = m[1];
        const params = m[2].trim();
        const s = this.matchScore(fn, prefix);
        if (s > 0 || (forced && prefix.length === 0)) {
          addItem(fn, 'fn', params ? `funcao(${params})` : 'Função declarada', s || 1);
        }
      }

      // Imported library exports
      const importPattern = /importe\s+(\w+)/g;
      while ((m = importPattern.exec(source)) !== null) {
        const key = m[1];
        const lib = CrabLibRegistry.get(key);
        if (lib) {
          // Show function exports with descriptions if available
          if (lib.functions && lib.functions.length > 0) {
            for (const fObj of lib.functions) {
              const s = this.matchScore(fObj.name, prefix);
              if (s > 0 || (forced && prefix.length === 0)) {
                const desc = fObj.desc || (fObj.params ? `${fObj.name}(${fObj.params})` : `Exportada de ${key}`);
                addItem(fObj.name, 'fn', desc, s || 1);
              }
            }
          } else if (lib.exports) {
            for (const exp of lib.exports) {
              const s = this.matchScore(exp, prefix);
              if (s > 0 || (forced && prefix.length === 0)) {
                addItem(exp, 'fn', `Exportada de ${key}`, s || 1);
              }
            }
          }
        }
        // CSV dataset columns
        try {
          const datasets = getCsvDatasets();
          const ds = datasets.find(d => d.key === key);
          if (ds && ds.columns) {
            for (const col of ds.columns) {
              const s = this.matchScore(col.name, prefix);
              if (s > 0 || (forced && prefix.length === 0)) {
                const typeLabel = col.type === 'number' ? '🔢 numérico' : '🔤 texto';
                addItem(col.name, 'arr', `${typeLabel} · ${col.values.length} valores · dataset ${key}`, s || 1);
              }
            }
          }
        } catch(e) {}
      }
    } catch(e) { /* ignore lexer errors during autocomplete */ }

    // Formats (low priority in general context)
    for (const f of this.FORMAT_DATA) {
      const s = this.matchScore(f.label, prefix);
      if (s > 0) addItem(f.label, 'fmt', f.desc, s);
    }

    // Sort by score descending, then by label length ascending (shorter = more relevant)
    suggestions.sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return a.label.length - b.label.length;
    });

    this.items = suggestions.slice(0, 30);
  },

  render() {
    this.popup.innerHTML = '';
    const badgeLabels = { kw: 'KW', var: 'VAR', arr: 'ARR', obj: 'OBJ', fn: 'FN', fmt: 'FMT', lib: 'LIB', snip: '✦' };

    this.items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item' + (i === this.selectedIndex ? ' selected' : '');

      // Highlight matching portion of label
      let labelHtml = escapeHtml(item.label);
      if (this.currentWord && this.currentWord.length > 0) {
        const idx = item.label.toLowerCase().indexOf(this.currentWord.toLowerCase());
        if (idx >= 0) {
          const before = escapeHtml(item.label.substring(0, idx));
          const match = escapeHtml(item.label.substring(idx, idx + this.currentWord.length));
          const after = escapeHtml(item.label.substring(idx + this.currentWord.length));
          labelHtml = `${before}<span class="ac-match">${match}</span>${after}`;
        }
      }

      let descHtml = item.desc ? `<span class="ac-desc">${escapeHtml(item.desc)}</span>` : '';
      div.innerHTML = `<span class="ac-badge ${item.type}">${badgeLabels[item.type] || ''}</span><span class="ac-info"><span class="ac-label">${labelHtml}</span>${descHtml}</span>`;

      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        this.selectedIndex = i;
        this.accept();
      });
      this.popup.appendChild(div);
    });

    // Footer hint
    const footer = document.createElement('div');
    footer.className = 'autocomplete-footer';
    footer.textContent = '↑↓ navegar  Tab/Enter aceitar  Esc fechar';
    this.popup.appendChild(footer);
  },

  position(wordStart) {
    const text = codeEditor.value.substring(0, wordStart);
    const lines = text.split('\n');
    const lineNum = lines.length;
    const colNum = lines[lines.length - 1].length;

    const style = getComputedStyle(codeEditor);
    const lineHeight = parseFloat(style.lineHeight) || 22;
    const charWidth = this.measureCharWidth();
    const editorRect = codeEditor.getBoundingClientRect();

    const paddingLeft = parseFloat(style.paddingLeft) || 0;
    const paddingTop = parseFloat(style.paddingTop) || 0;

    let top = editorRect.top + paddingTop + (lineNum * lineHeight) - codeEditor.scrollTop + 4;
    let left = editorRect.left + paddingLeft + (colNum * charWidth) - codeEditor.scrollLeft;

    // Clamp to viewport
    const popupHeight = Math.min(260, this.items.length * 38 + 24);
    if (top + popupHeight > window.innerHeight) {
      top = top - popupHeight - lineHeight - 8;
    }
    if (left + 220 > window.innerWidth) {
      left = window.innerWidth - 230;
    }

    this.popup.style.top = Math.max(0, top) + 'px';
    this.popup.style.left = Math.max(0, left) + 'px';
  },

  moveSelection(delta) {
    this.selectedIndex = Math.max(0, Math.min(this.items.length - 1, this.selectedIndex + delta));
    this.render();
    const selected = this.popup.querySelector('.selected');
    if (selected) selected.scrollIntoView({ block: 'nearest' });
  },

  accept() {
    if (this.selectedIndex < 0 || this.selectedIndex >= this.items.length) {
      this.hide();
      return;
    }
    const item = this.items[this.selectedIndex];
    const pos = codeEditor.selectionStart;
    const text = codeEditor.value;

    // For snippets, replace the whole current word/prefix with the snippet insert text
    const insertText = item.insert || item.label;

    // Multi-word items may have an adjusted wordStart
    const ws = item.wordStart != null ? item.wordStart : this.wordStart;

    const before = text.substring(0, ws);
    const after = text.substring(pos);
    codeEditor.value = before + insertText + after;
    const newPos = ws + insertText.length;
    codeEditor.selectionStart = codeEditor.selectionEnd = newPos;
    this.hide();
    updateEditor();
    codeEditor.focus();
  },

  hide() {
    if (!this.popup) return;
    this.popup.classList.remove('visible');
    this.active = false;
    this.items = [];
    this.selectedIndex = -1;
  }
};

// ==================== EXPORT AS PNG ====================
function exportPNG() {
  // Load html2canvas dynamically if not already loaded
  if (typeof html2canvas === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload = () => _doExportPNG();
    script.onerror = () => alert('Erro ao carregar html2canvas. Verifique sua conexão com a internet.');
    document.head.appendChild(script);
  } else {
    _doExportPNG();
  }
}

function _doExportPNG() {
  const editorContainer = document.querySelector('.editor-container');
  if (!editorContainer) return;

  // Create a temporary clone for better capture
  const clone = editorContainer.cloneNode(true);
  clone.style.position = 'absolute';
  clone.style.left = '-9999px';
  clone.style.top = '0';
  clone.style.width = editorContainer.offsetWidth + 'px';
  clone.style.height = 'auto';
  clone.style.overflow = 'visible';
  clone.style.maxHeight = 'none';

  // Expand the textarea content to full height in the clone
  const textarea = clone.querySelector('textarea');
  if (textarea) {
    textarea.style.height = textarea.scrollHeight + 'px';
    textarea.style.overflow = 'visible';
  }
  const overlay = clone.querySelector('.highlight-overlay');
  if (overlay) {
    overlay.style.height = 'auto';
    overlay.style.overflow = 'visible';
  }

  document.body.appendChild(clone);

  html2canvas(clone, {
    scale: 2,
    backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg-main').trim() || '#1e1e2e',
    useCORS: true,
    logging: false,
  }).then(canvas => {
    document.body.removeChild(clone);
    const link = document.createElement('a');
    link.download = 'crabcode-' + new Date().toISOString().slice(0, 10) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err => {
    document.body.removeChild(clone);
    console.error('Export PNG error:', err);
    alert('Erro ao exportar como PNG.');
  });
}

// ==================== PRESENTATION MODE ====================
let isPresentationMode = false;

function togglePresentation() {
  if (isPresentationMode) {
    exitPresentation();
  } else {
    enterPresentation();
  }
}

function enterPresentation() {
  // Run code first so output is populated
  runCode().then(() => {
    document.body.classList.add('presentation');
    isPresentationMode = true;

    // Try fullscreen
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
  });
}

function exitPresentation() {
  document.body.classList.remove('presentation');
  isPresentationMode = false;

  if (document.fullscreenElement) {
    document.exitFullscreen().catch(() => {});
  } else if (document.webkitFullscreenElement) {
    document.webkitExitFullscreen();
  }
}

// Exit presentation on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isPresentationMode) {
    exitPresentation();
  }
});

// Exit presentation when fullscreen changes
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && isPresentationMode) {
    exitPresentation();
  }
});

// ==================== EXPORT AS PDF ====================
function exportPDF() {
  // Load jsPDF and html2canvas dynamically if needed
  const loadScript = (src) => new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });

  const deps = [];
  if (typeof html2canvas === 'undefined') {
    deps.push(loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'));
  }
  if (typeof window.jspdf === 'undefined') {
    deps.push(loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'));
  }

  Promise.all(deps)
    .then(() => _doExportPDF())
    .catch(() => alert('Erro ao carregar dependências do PDF. Verifique sua conexão.'));
}

async function _doExportPDF() {
  const { jsPDF } = window.jspdf;

  // Create a temporary container for the PDF content
  const container = document.createElement('div');
  container.style.cssText = 'position:absolute;left:-9999px;top:0;width:800px;padding:24px;background:' +
    (getComputedStyle(document.body).getPropertyValue('--bg-main').trim() || '#1e1e2e') +
    ';color:' + (getComputedStyle(document.body).getPropertyValue('--text-primary').trim() || '#cdd6f4') +
    ';font-family:monospace;font-size:13px;';

  // Title
  const title = document.createElement('div');
  title.style.cssText = 'font-size:20px;font-weight:bold;margin-bottom:16px;color:' +
    (getComputedStyle(document.body).getPropertyValue('--color-laranja').trim() || '#fab387');
  title.innerHTML = '<img src="crabcode_logo.png" alt="CrabCode" style="height:1em;vertical-align:middle;margin-right:4px;"> CrabCode';
  container.appendChild(title);

  // Code section
  const codeSection = document.createElement('div');
  codeSection.style.cssText = 'margin-bottom:20px;';
  const codeTitle = document.createElement('div');
  codeTitle.style.cssText = 'font-size:14px;font-weight:bold;margin-bottom:8px;';
  codeTitle.textContent = 'Código:';
  codeSection.appendChild(codeTitle);

  const codePre = document.createElement('pre');
  codePre.style.cssText = 'background:rgba(0,0,0,0.2);padding:12px;border-radius:6px;white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.6;';
  codePre.textContent = codeEditor.value;
  codeSection.appendChild(codePre);
  container.appendChild(codeSection);

  // Output section
  const outputSection = document.createElement('div');
  const outputTitle = document.createElement('div');
  outputTitle.style.cssText = 'font-size:14px;font-weight:bold;margin-bottom:8px;';
  outputTitle.textContent = 'Output:';
  outputSection.appendChild(outputTitle);

  const outputClone = document.getElementById('output-body').cloneNode(true);
  outputClone.style.cssText = 'background:rgba(0,0,0,0.2);padding:12px;border-radius:6px;overflow:visible;max-height:none;';
  outputSection.appendChild(outputClone);
  container.appendChild(outputSection);

  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:16px;font-size:10px;color:#6c7086;text-align:right;';
  footer.textContent = 'Gerado por CrabCode em ' + new Date().toLocaleDateString('pt-BR');
  container.appendChild(footer);

  document.body.appendChild(container);

  try {
    const canvas = await html2canvas(container, {
      scale: 2,
      backgroundColor: getComputedStyle(document.body).getPropertyValue('--bg-main').trim() || '#1e1e2e',
      useCORS: true,
      logging: false,
      width: 800,
    });
    document.body.removeChild(container);

    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pdfWidth - 20; // 10mm margin each side
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    let yOffset = 10;
    let remainingHeight = imgHeight;
    const pageContentHeight = pdfHeight - 20;

    // Handle multi-page if content is tall
    if (imgHeight <= pageContentHeight) {
      pdf.addImage(imgData, 'PNG', 10, yOffset, imgWidth, imgHeight);
    } else {
      // Split into pages using canvas slicing
      const totalPages = Math.ceil(imgHeight / pageContentHeight);
      for (let page = 0; page < totalPages; page++) {
        if (page > 0) pdf.addPage();
        const srcY = (page * pageContentHeight / imgHeight) * canvas.height;
        const srcH = Math.min((pageContentHeight / imgHeight) * canvas.height, canvas.height - srcY);
        const sliceCanvas = document.createElement('canvas');
        sliceCanvas.width = canvas.width;
        sliceCanvas.height = srcH;
        const ctx = sliceCanvas.getContext('2d');
        ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
        const sliceData = sliceCanvas.toDataURL('image/png');
        const sliceHeight = (srcH * imgWidth) / canvas.width;
        pdf.addImage(sliceData, 'PNG', 10, 10, imgWidth, sliceHeight);
      }
    }

    pdf.save('crabcode-' + new Date().toISOString().slice(0, 10) + '.pdf');
  } catch (err) {
    if (container.parentNode) document.body.removeChild(container);
    console.error('Export PDF error:', err);
    alert('Erro ao exportar como PDF.');
  }
}
