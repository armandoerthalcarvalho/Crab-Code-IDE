    if (node.elseTokens && node.elseTokens.length > 0) {
      const elseExpr = this.tokensToExpr(node.elseTokens);
      return `if (${cond}) { __output.push({ type: "execute", value: ${expr} }); } else { __output.push({ type: "execute", value: ${elseExpr} }); }`;
    }
    return `if (${cond}) { __output.push({ type: "execute", value: ${expr} }); }`;
  }

  transpileExecuteRepeat(node) {
    const expr = this.tokensToExpr(node.exprTokens);
    const times = this.tokensToExpr(node.timesTokens);
    // Use a function to re-evaluate expr each iteration (important for dynamic values like functions)
    return `for (let __i = 0; __i < ${times}; __i++) { __output.push({ type: "execute", value: (${expr}) }); }`;
  }

  transpileExecuteRepeatMath(node) {
    const times = this.tokensToExpr(node.timesTokens);
    const mathExpr = this.transpileExecuteMathExpr(node.mathNode);
    // Re-evaluate math expression each iteration (critical for aleatorio)
    return `for (let __i = 0; __i < ${times}; __i++) { __output.push({ type: "execute", value: ${mathExpr} }); }`;
  }

  transpileExecuteRepeatConditional(node) {
    const times = this.tokensToExpr(node.timesTokens);
    const expr = this.tokensToExpr(node.exprTokens);
    const cond = this.tokensToExpr(node.condTokens);
    let body;
    if (node.elseTokens && node.elseTokens.length > 0) {
      const elseExpr = this.tokensToExpr(node.elseTokens);
      body = `if (${cond}) { __output.push({ type: "execute", value: ${expr} }); } else { __output.push({ type: "execute", value: ${elseExpr} }); }`;
    } else {
      body = `if (${cond}) { __output.push({ type: "execute", value: ${expr} }); }`;
    }
    return `for (let __i = 0; __i < ${times}; __i++) { ${body} }`;
  }

  transpileExecuteMathExpr(node) {
    if (node.op === 'potencia') {
      const args = [];
      let current = [];
      for (const t of node.argTokens) {
        if (t.type === 'VIRGULA') {
          args.push(this.tokensToExpr(current));
          current = [];
        } else {
          current.push(t);
        }
      }
      if (current.length > 0) args.push(this.tokensToExpr(current));
      return `Math.pow(${args[0] || 0}, ${args[1] || 0})`;
    }
    if (node.op === 'raiz') {
      const val = this.tokensToExpr(node.argTokens);
      return `Math.sqrt(${val})`;
    }
    if (node.op === 'aleatorio') {
      let minTokens = [], maxTokens = [];
      let inMax = false;
      for (const t of node.argTokens) {
        if (t.type === 'E_CONJ') { inMax = true; continue; }
        if (inMax) maxTokens.push(t);
        else minTokens.push(t);
      }
      const min = this.tokensToExpr(minTokens);
      const max = this.tokensToExpr(maxTokens);
      return `(Math.floor(Math.random() * (${max} - ${min} + 1)) + ${min})`;
    }
    if (node.op === 'juros_compostos') {
      const taxa = this.tokensToExpr(node.taxaTokens);
      const n    = this.tokensToExpr(node.periodosTokens);
      const fator = `Math.pow(1 + (${taxa}), (${n}))`;
      if (node.montanteTokens) {
        const montante = this.tokensToExpr(node.montanteTokens);
        return `((${montante}) * ${fator})`;
      }
      return fator;
    }
    if (node.op === 'tamanho_de') {
      const src = this.tokensToExpr(node.srcTokens);
      return `(Array.isArray(${src}) ? ${src}.length : Object.keys(${src}).length)`;
    }
    if (node.op === 'percentil_de') {
      const data = this.tokensToExpr(node.dataTokens);
      const p    = this.tokensToExpr(node.pTokens);
      // Works on both arrays and objects (extracts numeric values from objects)
      return `(function(){
  const __raw = ${data};
  const __arr = (Array.isArray(__raw) ? __raw : Object.values(__raw))
    .map(Number).filter(v => !isNaN(v) && isFinite(v)).sort((a,b)=>a-b);
  if (__arr.length === 0) return null;
  const __p = ${p};
  const __idx = (__p / 100) * (__arr.length - 1);
  const __lo = Math.floor(__idx), __hi = Math.ceil(__idx);
  return __lo === __hi ? __arr[__lo] : __arr[__lo] + (__arr[__hi] - __arr[__lo]) * (__idx - __lo);
})()`.replace(/\n\s*/g, ' ');
    }
    return '0';
  }

  transpileExecuteAmostras(node) {
    // Use transpileRodarExec to handle ALL expr forms: aleatorio, potencia, juros, se/senao, etc.
    const expr = this.transpileRodarExec(node.exprTokens);
    const n    = this.tokensToExpr(node.nTokens);
    return `__output.push({ type: "execute", value: (function(){ const __s=[]; for(let __i=0;__i<${n};__i++) __s.push(${expr}); return __s; })() });`;
  }

  transpileExecuteLoop(node) {
    // for (let i = INIT; COND; i = INCR) { BODY }
    // 'i' is injected implicitly — cond and incr tokens can reference it directly

    const init = this.tokensToExpr(node.initTokens);

    // Inject 'i' into declaredVars so body and cond/incr resolve it as a variable
    const iWasDeclared = this.declaredVars.has('i');
    this.declaredVars.add('i');

    const cond = this.tokensToExpr(node.condTokens);
    const incr = this.tokensToExpr(node.incrTokens);

    // Transpile body using same sub-statement logic as funcao body
    const bodyLines = this.transpileLoopBody(node.bodyTokens);

    if (!iWasDeclared) this.declaredVars.delete('i');

    return `{ for (let i = ${init}; ${cond}; i = ${incr}) { ${bodyLines} } }`;
  }

  transpileLoopBody(bodyTokens) {
    if (!bodyTokens || bodyTokens.length === 0) return '';

    // Split into sub-statements by LARANJA tokens at depth 0 (same as funcao body)
    const subStatements = [];
    let current = [];
    let depth = 0;
    for (const t of bodyTokens) {
      if (t.type === 'PAREN' && t.value === '(') depth++;
      else if (t.type === 'PAREN' && t.value === ')') depth--;
      if (['DEFINA', 'ALTERE', 'EXECUTE', 'APRESENTE'].includes(t.type) && depth === 0 && current.length > 0) {
        subStatements.push(current);
        current = [t];
      } else {
        current.push(t);
      }
    }
    if (current.length > 0) subStatements.push(current);

    const lines = [];
    for (const stmtTokens of subStatements) {
      const first = stmtTokens[0];
      if (first.type === 'EXECUTE') {
        lines.push(this.transpileFuncBodyExecute(stmtTokens.slice(1)));
      } else if (first.type === 'ALTERE') {
        if (stmtTokens.length >= 4 && stmtTokens[2].type === 'PARA') {
          const name = stmtTokens[1].value;
          const relatandoIdx = stmtTokens.findIndex(t => t.type === 'RELATANDO');
          const enquantoIdx = stmtTokens.findIndex(t => t.type === 'ENQUANTO');
          let valEnd = stmtTokens.length;
          if (relatandoIdx !== -1) valEnd = Math.min(valEnd, relatandoIdx);
          if (enquantoIdx !== -1) valEnd = Math.min(valEnd, enquantoIdx);
          const val = this.tokensToExpr(stmtTokens.slice(3, valEnd));
          let stmt = `${name} = ${val};`;
          if (relatandoIdx !== -1) stmt += ` __output.push({ type: "execute", value: ${name} });`;
          lines.push(stmt);
        }
      } else if (first.type === 'DEFINA') {
        if (stmtTokens.length >= 4 && stmtTokens[2].type === 'COMO') {
          const name = stmtTokens[1].value;
          const val = this.tokensToExpr(stmtTokens.slice(3));
          this.declaredVars.add(name);
          lines.push(`let ${name} = ${val};`);
        }
      } else if (first.type === 'APRESENTE') {
        const rest = stmtTokens.slice(1);
        let format = 'texto', exprT = rest;
        for (let j = rest.length - 2; j >= 0; j--) {
          if (rest[j].type === 'EM') {
            exprT = rest.slice(0, j);
            const fv = rest[j + 1]?.value?.toLowerCase();
            if (fv) format = fv === 'apresentacao' ? 'apresentação' : fv;
            break;
          }
        }
        lines.push(`__output.push({ type: "${format}", value: ${this.tokensToExpr(exprT)} });`);
      }
    }
    return lines.join(' ');
  }

  transpileExecuteMath(node) {
    const mathExpr = this.transpileExecuteMathExpr(node);
    return `__output.push({ type: "execute", value: ${mathExpr} });`;
  }

  transpileApresente(node) {
    const expr = this.tokensToExpr(node.exprTokens);
    const format = node.format;
    if (format === 'tabela' || format === 'grafico') {
      const xName = JSON.stringify(node.xName || 'x');
      if (node.yExprTokens) {
        const yExpr = this.tokensToExpr(node.yExprTokens);
        const yName = JSON.stringify(node.yName || 'y');
        return `__output.push({ type: "${format}", value: ${expr}, yValue: ${yExpr}, xName: ${xName}, yName: ${yName} });`;
      }
      return `__output.push({ type: "${format}", value: ${expr}, xName: ${xName} });`;
    }
    if (format === 'estatisticas') {
      const xName = JSON.stringify(node.xName || 'obj');
      return `__output.push({ type: "estatisticas", value: ${expr}, xName: ${xName} });`;
    }
    return `__output.push({ type: "${format}", value: ${expr} });`;
  }

  transpileImportLib(node) {
    if (!this._importedLibs) this._importedLibs = new Set();
    const libName = node.libName;
    if (this._importedLibs.has(libName)) return '';
    this._importedLibs.add(libName);
    const lib = typeof CrabLibRegistry !== 'undefined' ? CrabLibRegistry.get(libName) : null;
    if (!lib) {
      // Check if it's a CSV dataset — code injection is handled by getCsvInjectionCode()
      const _csvDs = typeof getCsvDatasets === 'function' ? getCsvDatasets() : [];
      const _csvMatch = _csvDs.find(d => d.key === libName);
      if (_csvMatch) {
        for (const col of _csvMatch.columns) {
          this.declaredVars.add(col.name);
          this.declaredArrays.add(col.name);
        }
      }
      return '';
    }
    if (lib.dependencies) {
      let code = '';
      for (const depName of lib.dependencies) {
        if (!this._importedLibs.has(depName)) {
          code += this.transpileImportLib({ type: 'ImportLib', libName: depName, line: node.line });
          code += '\n';
        }
      }
      return code;
    }
    if (lib.exports) {
      for (const name of lib.exports) this.declaredVars.add(name);
    }
    return lib.jsCode || '';
  }
}

// ==================== RUNTIME ====================
class Runtime {
  constructor() {
    this._sandboxReady = false;
    this._iframe = null;
    this._pendingResolve = null;
    this._pendingReject = null;
    this._timeout = null;
    this._initSandbox();
  }

  _initSandbox() {
    // Create a hidden sandboxed iframe — allow-scripts only (no allow-same-origin)
    this._iframe = document.createElement('iframe');
    this._iframe.sandbox = 'allow-scripts';
    this._iframe.style.cssText = 'display:none;width:0;height:0;border:none;position:absolute;';
    this._iframe.srcdoc = `<!DOCTYPE html><html><head><script>
      window.addEventListener('message', function(e) {
        try {
          var code = e.data && e.data.code;
          if (typeof code !== 'string') return;
          var fn = new Function(code);
          var output = fn();
          parent.postMessage({ id: e.data.id, output: output || [], error: null }, '*');
        } catch (err) {
          parent.postMessage({ id: e.data.id, output: [], error: err.message }, '*');
        }
      });
      parent.postMessage({ type: 'sandbox-ready' }, '*');
    <\/script></head><body></body></html>`;

    // Listen for messages from the sandbox
    this._messageHandler = (e) => {
      if (!e.data) return;
      if (e.data.type === 'sandbox-ready') {
        this._sandboxReady = true;
        return;
      }
      if (e.data.id !== undefined && this._pendingResolve) {
        clearTimeout(this._timeout);
        const resolve = this._pendingResolve;
        this._pendingResolve = null;
        this._pendingReject = null;
        resolve({ output: e.data.output || [], error: e.data.error || null });
      }
    };
    window.addEventListener('message', this._messageHandler);
    document.body.appendChild(this._iframe);
  }

  runInSandbox(jsCode, timeoutMs = 10000) {
    return new Promise((resolve, reject) => {
      const id = Date.now() + Math.random();
      this._pendingResolve = resolve;
      this._pendingReject = reject;

      this._timeout = setTimeout(() => {
        // Timeout — destroy and recreate iframe
        this._pendingResolve = null;
        this._pendingReject = null;
        this._resetSandbox();
        resolve({ output: [], error: 'Tempo limite excedido (timeout de ' + (timeoutMs / 1000) + 's). Verifique se há loops infinitos no código.' });
      }, timeoutMs);

      try {
        this._iframe.contentWindow.postMessage({ id: id, code: jsCode }, '*');
      } catch (e) {
        clearTimeout(this._timeout);
        this._pendingResolve = null;
        this._pendingReject = null;
        // Fallback to direct execution
        resolve(this._runDirect(jsCode));
      }
    });
  }

  _resetSandbox() {
    if (this._iframe && this._iframe.parentNode) {
      this._iframe.parentNode.removeChild(this._iframe);
    }
    this._sandboxReady = false;
    this._initSandbox();
  }

  _runDirect(jsCode) {
    // Fallback — direct execution (used if sandbox unavailable)
    try {
      const fn = new Function(jsCode);
      const output = fn();
      return { output: output || [], error: null };
    } catch (e) {
      return { output: [], error: e.message };
    }
  }

  // Legacy synchronous API (fallback)
  run(jsCode) {
    return this._runDirect(jsCode);
  }
}

      dependencies: ['matematica', 'geometria', 'progressoes', 'numeros', 'algebra_linear', 'probabilidade', 'estatistica_avancada', 'trigonometria', 'combinatoria', 'numeros_complexos', 'sequencias', 'conjuntos', 'matematica_discreta', 'teoria_grafos'],
    },

    // ── biblioteca_financeira_completa ───────────────────────
    biblioteca_financeira_completa: {
      key: 'biblioteca_financeira_completa',
      selo: 'meta',
      title: '💰 Financeira Completa',
      description: 'Meta-biblioteca que importa finanças, investimentos, economia, finanças BR, contabilidade, marketing digital e logística.',
      exports: [],
      functions: [],
      jsCode: '',
      example: `importe biblioteca_financeira_completa\n\nexecute juros_compostos(1000, 0.01, 12)\nexecute roi_investimento(15000, 10000)\nexecute pib_per_capita(2000000, 200000)\nexecute aliquota_irpf(4500)\napresente roe(120000, 400000) em destaque`,
      dependencies: ['formulas_financas', 'investimentos', 'formulas_economia', 'financas_br', 'formulas_contabilidade', 'marketing_digital', 'logistica', 'matematica_financeira_avancada'],
    },
  },

  get(name) {
    if (this.official[name]) return this.official[name];
    const custom = this.getCustomLibs();
    return custom[name] || null;
  },

  getAll() {
    return { ...this.official, ...this.getCustomLibs() };
  },

  getOfficialKeys() {
    return Object.keys(this.official);
  },

  getCustomLibs() {
    try { return JSON.parse(localStorage.getItem('crabcode_custom_libs') || '{}'); }
    catch { return {}; }
  },

  saveCustomLib(lib) {
    const custom = this.getCustomLibs();
    custom[lib.key] = lib;
    localStorage.setItem('crabcode_custom_libs', JSON.stringify(custom));
  },

  deleteCustomLib(key) {
    const custom = this.getCustomLibs();
    delete custom[key];
    localStorage.setItem('crabcode_custom_libs', JSON.stringify(custom));
  },

  compileCustomLib(crabCodeSrc) {
    try {
      const lexer = new Lexer(crabCodeSrc);
      const { tokens, errors: lexErrors } = lexer.tokenize();
      const parser = new Parser(tokens, new Set(lexer.declaredVars), new Set(lexer.declaredArrays), new Set(lexer.declaredObjects));
      const { ast, errors: parseErrors } = parser.parse();
      const transpiler = new Transpiler(ast, new Set(lexer.declaredVars), new Set(lexer.declaredArrays), new Set(lexer.declaredObjects));
      const { code: jsCode, errors: transpileErrors } = transpiler.transpile();
      const allErrors = [...lexErrors, ...parseErrors, ...transpileErrors];
      if (allErrors.length > 0) return { error: allErrors[0].message, jsCode: null, exports: [] };
      const lines = jsCode.split('\n').filter(l => !l.startsWith('const __output') && !l.startsWith('return __output') && !l.includes('__output.push'));
      const cleanJs = lines.join('\n').replace(/^let /gm, 'var ');
      const exportNames = [];
      const funcRe = /^function\s+([a-zA-ZÀ-ÿ_][a-zA-ZÀ-ÿ0-9_]*)/gm;
      const varRe = /^var\s+([a-zA-ZÀ-ÿ_][a-zA-ZÀ-ÿ0-9_]*)/gm;
      let fm;
      while ((fm = funcRe.exec(cleanJs)) !== null) exportNames.push(fm[1]);
      while ((fm = varRe.exec(cleanJs)) !== null) exportNames.push(fm[1]);
      return { error: null, jsCode: cleanJs, exports: exportNames };
    } catch (e) {
      return { error: e.message, jsCode: null, exports: [] };
    }
  }
};

// ==================== OUTPUT RENDERER ====================
class OutputRenderer {
  constructor(container) {
    this.container = container;
  }

  clear() {
    this.container.innerHTML = `
      <div class="output-empty">
        <div class="crab"><img src="crabcode_logo.png" alt="CrabCode" style="width:48px;height:48px;"></div>
        <div>Pressione <strong>▶ Rodar</strong> ou <strong>Ctrl+Enter</strong></div>
        <div>para executar seu código CrabCode</div>
      </div>`;
  }

  render(outputItems) {
    this.container.innerHTML = '';
    if (!outputItems || outputItems.length === 0) {
      this.container.innerHTML = `
        <div class="output-empty">
          <div class="crab"><img src="crabcode_logo.png" alt="CrabCode" style="width:48px;height:48px;"></div>
          <div>Nenhum resultado produzido</div>
          <div>Use <code>execute</code> ou <code>apresente</code></div>
        </div>`;
      return;
    }

    for (const item of outputItems) {
      const el = this.renderItem(item);
      if (el) this.container.appendChild(el);
    }

    this.container.scrollTop = this.container.scrollHeight;
  }

  renderItem(item) {
    if (item === null || item === undefined) return null;

    const type = item.type || 'execute';
    const value = item.value;

    switch (type) {
      case 'execute': return this.renderExecute(value);
      case 'texto': return this.renderTexto(value);
      case 'destaque': return this.renderDestaque(value);
      case 'apresentação':
      case 'apresentacao': return this.renderApresentacao(value);
      case 'dados': return this.renderDados(value);
      case 'tabela': return this.renderTabela(item);
      case 'grafico': return this.renderGrafico(item);
      case 'estatisticas': return this.renderEstatisticas(item);
      case 'cientifica': return this.renderCientifica(item);
      default: return this.renderExecute(value);
    }
  }

  renderExecute(value) {
    const div = document.createElement('div');
    div.className = 'output-item output-execute';
    div.textContent = this.formatValue(value);
    return div;
  }

  renderTexto(value) {
    const p = document.createElement('p');
    p.className = 'output-item output-texto';
    p.textContent = this.formatValue(value);
    return p;
  }

  renderDestaque(value) {
    const div = document.createElement('div');
    div.className = 'output-item output-destaque';
    div.textContent = this.formatValue(value);
    return div;
  }

  renderApresentacao(value) {
    const div = document.createElement('div');
    div.className = 'output-item output-apresentacao';
    
    if (typeof value === 'object' && value !== null) {
      for (const [key, val] of Object.entries(value)) {
        const labelSpan = document.createElement('span');
        labelSpan.className = 'label';
        labelSpan.textContent = key + ': ';
        div.appendChild(labelSpan);
        div.appendChild(document.createTextNode(this.formatValue(val) + '  '));
      }
    } else {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = '→ ';
      div.appendChild(label);
      div.appendChild(document.createTextNode(this.formatValue(value)));
    }
    return div;
  }

  renderDados(value) {
    const table = document.createElement('table');
    table.className = 'output-item output-dados';

    if (Array.isArray(value)) {
      // Array of objects or array of values
      if (value.length > 0 && typeof value[0] === 'object') {
        const keys = Object.keys(value[0]);
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        for (const k of keys) {
          const th = document.createElement('th');
          th.textContent = k;
          headerRow.appendChild(th);
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        for (const row of value) {
          const tr = document.createElement('tr');
          for (const k of keys) {
            const td = document.createElement('td');
            td.textContent = this.formatValue(row[k]);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
      } else {
        const thead = document.createElement('thead');
        const tr = document.createElement('tr');
        const th = document.createElement('th');
        th.textContent = 'Índice';
        tr.appendChild(th);
        const th2 = document.createElement('th');
        th2.textContent = 'Valor';
        tr.appendChild(th2);
        thead.appendChild(tr);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        value.forEach((v, idx) => {
          const row = document.createElement('tr');
          const td1 = document.createElement('td');
          td1.textContent = idx;
          row.appendChild(td1);
          const td2 = document.createElement('td');
          td2.textContent = this.formatValue(v);
          row.appendChild(td2);
          tbody.appendChild(row);
        });
        table.appendChild(tbody);
      }
    } else {
      // Single value
      const tbody = document.createElement('tbody');
      const row = document.createElement('tr');
      const td = document.createElement('td');
      td.textContent = this.formatValue(value);
      row.appendChild(td);
      tbody.appendChild(row);
      table.appendChild(tbody);
    }

    return table;
  }

  renderTabela(item) {
    const xObj = item.value;
    const yObj = item.yValue;
    const xName = item.xName || 'x';
    const yName = item.yName || null;
    const singleMode = !yObj || typeof yObj !== 'object';

    if (typeof xObj !== 'object' || xObj === null) {
      return this.renderExecute(`[tabela] '${xName}' não é um objeto`);
    }

    const keys = Object.keys(xObj);
    const wrap = document.createElement('div');
    wrap.className = 'output-item';

    const table = document.createElement('table');
    table.className = 'output-tabela';

    // Header
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    const headers = singleMode ? ['', xName] : ['', xName, yName || 'y'];
    headers.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Body
    const tbody = document.createElement('tbody');
    for (const key of keys) {
      const tr = document.createElement('tr');
      const cells = singleMode
        ? [key, this.formatValue(xObj[key])]
        : [key, this.formatValue(xObj[key]), this.formatValue(yObj[key] ?? '—')];
      cells.forEach(cell => {
        const td = document.createElement('td');
        td.textContent = cell;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  renderGrafico(item) {
    const xObj = item.value;
    const yObj = item.yValue;
    const xName = item.xName || 'x';
    const yName = item.yName || null;
    const singleMode = !yObj || typeof yObj !== 'object';

    if (typeof xObj !== 'object' || xObj === null) {
      return this.renderExecute(`[grafico] '${xName}' não é um objeto`);
    }

    const keys = Object.keys(xObj);
    const xVals = keys.map(k => Number(xObj[k]) || 0);
    const yVals = singleMode ? null : keys.map(k => Number(yObj[k]) || 0);

    const wrap = document.createElement('div');
    wrap.className = 'output-item output-grafico-wrap';

    const canvas = document.createElement('canvas');
    const W = 480, H = 240;
    canvas.width = W;
    canvas.height = H;
    wrap.appendChild(canvas);

    // Legend
    const legend = document.createElement('div');
    legend.className = 'output-grafico-legend';

    // Colors — use CSS vars resolved at runtime
    const style = getComputedStyle(document.body);
    const colorX = style.getPropertyValue('--color-azul').trim() || '#89b4fa';
    const colorY = style.getPropertyValue('--color-roxo').trim() || '#cba6f7';
    const colorGrid = style.getPropertyValue('--border').trim() || '#313244';
    const colorText = style.getPropertyValue('--text-muted').trim() || '#6c7086';
    const colorLabel = style.getPropertyValue('--text-secondary').trim() || '#a6adc8';

    const PAD = { top: 20, right: 20, bottom: 48, left: 48 };
    const chartW = W - PAD.left - PAD.right;
    const chartH = H - PAD.top - PAD.bottom;

    const allVals = [...xVals, ...(yVals || [])];
    const minVal = Math.min(0, ...allVals);
    const maxVal = Math.max(...allVals) || 1;
    const range = maxVal - minVal || 1;

    const toY = v => PAD.top + chartH - ((v - minVal) / range) * chartH;
    const toX = i => PAD.left + (i / (keys.length - 1 || 1)) * chartW;

    // Draw on next tick so canvas is in DOM and sized
    requestAnimationFrame(() => {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);

      // Grid lines
      const ticks = 4;
      ctx.strokeStyle = colorGrid;
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3, 3]);
      for (let t = 0; t <= ticks; t++) {
        const v = minVal + (range / ticks) * t;
        const y = toY(v);
        ctx.beginPath();
        ctx.moveTo(PAD.left, y);
        ctx.lineTo(PAD.left + chartW, y);
        ctx.stroke();
        ctx.fillStyle = colorText;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(Number(v.toFixed(2)), PAD.left - 6, y + 4);
      }
      ctx.setLineDash([]);

      // X axis labels
      ctx.fillStyle = colorLabel;
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      keys.forEach((k, i) => {
        ctx.fillText(k, toX(i), H - PAD.bottom + 16);
      });

      // Draw line for a dataset
      const drawLine = (vals, color) => {
        if (!vals || vals.length === 0) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        vals.forEach((v, i) => {
          const x = toX(i), y = toY(v);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        // Dots
        vals.forEach((v, i) => {
          const x = toX(i), y = toY(v);
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = style.getPropertyValue('--bg-card').trim() || '#232336';
          ctx.lineWidth = 2;
          ctx.stroke();
        });
      };

      drawLine(xVals, colorX);
      if (yVals) drawLine(yVals, colorY);
    });

    // Legend entries
    [[xName, colorX], ...(yVals && yName ? [[yName, colorY]] : [])].forEach(([name, color]) => {
      const s = document.createElement('span');
      s.innerHTML = `<span class="dot" style="background:${color}"></span>${name}`;
      legend.appendChild(s);
    });
    wrap.appendChild(legend);
    return wrap;
  }

  renderEstatisticas(item) {
    const obj = item.value;
    const xName = item.xName || 'obj';

    if (!obj || typeof obj !== 'object' || Array.isArray(obj)) {
      return this.renderExecute(`[estatisticas] '${xName}' não é um objeto`);
    }

    // Extract numeric values only, silently ignoring non-numeric
    const nums = Object.values(obj).map(v => Number(v)).filter(v => !isNaN(v) && isFinite(v));

    if (nums.length === 0) {
      return this.renderExecute(`[estatisticas] '${xName}' não possui valores numéricos`);
    }

    // Média
    const mean = nums.reduce((a, b) => a + b, 0) / nums.length;

    // Mediana
    const sorted = [...nums].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    const median = sorted.length % 2 === 0
      ? (sorted[mid - 1] + sorted[mid]) / 2
      : sorted[mid];

    // Moda — retorna todos os valores com maior frequência, separados por vírgula
    const freq = {};
    for (const n of nums) freq[n] = (freq[n] || 0) + 1;
    const maxFreq = Math.max(...Object.values(freq));
    const modes = Object.entries(freq)
      .filter(([, f]) => f === maxFreq)
      .map(([v]) => Number(v));
    const modeStr = modes.map(v => Number(v.toFixed(4))).join(', ');

    // Desvio padrão amostral (N-1)
    const stddev = nums.length > 1
      ? Math.sqrt(nums.reduce((acc, v) => acc + Math.pow(v - mean, 2), 0) / (nums.length - 1))
      : 0;

    const fmt = v => {
      const n = Number(v.toFixed(4));
      return Number.isInteger(n) ? n : n;
    };

    const frag = document.createDocumentFragment();
    const rows = [
      ['Média', fmt(mean)],
      ['Mediana', fmt(median)],
      ['Moda', modeStr],
      ['Desvio Padrão', fmt(stddev)],
    ];

    for (const [label, val] of rows) {
      const div = document.createElement('div');
      div.className = 'output-item output-apresentacao';
      div.innerHTML = `<span class="apresentacao-label">${label}</span><span class="apresentacao-arrow">→</span><span class="apresentacao-value">${val}</span>`;
      frag.appendChild(div);
    }
    return frag;
  }

  renderCientifica(item) {
    const num = Number(item.value);
    if (isNaN(num) || !isFinite(num)) {
      return this.renderExecute(`[cientifica] valor não é numérico`);
    }

    // Decompõe em mantissa × 10^expoente com 2 casas decimais na mantissa
    const exp = num === 0 ? 0 : Math.floor(Math.log10(Math.abs(num)));
    const mantissa = num / Math.pow(10, exp);

    // Formata mantissa com até 2 casas, remove zeros desnecessários
    const mantissaStr = parseFloat(mantissa.toFixed(2)).toLocaleString('pt-BR');
    const expStr = exp >= 0 ? String(exp) : `<sup style="font-size:0.7em">-</sup>${Math.abs(exp)}`;

    // Converte expoente para superscript unicode
    const toSup = n => String(n).split('').map(c => '⁰¹²³⁴⁵⁶⁷⁸⁹'[c] ?? c).join('');
    const expDisplay = exp < 0 ? `⁻${toSup(Math.abs(exp))}` : toSup(exp);

    const div = document.createElement('div');
    div.className = 'output-item output-dados';
    div.innerHTML = `<span style="font-family:var(--font-mono);font-size:1.1em;letter-spacing:0.03em">${mantissaStr} × 10${expDisplay}</span>`;
    return div;
  }

  renderError(message) {
    const div = document.createElement('div');
    div.className = 'output-item output-error';
    div.textContent = '❌ Erro: ' + message;
    this.container.appendChild(div);
  }

  formatValue(value) {
    if (value === null || value === undefined) return '';
    if (typeof value === 'object') return JSON.stringify(value, null, 2);
    return String(value);
  }
}

// ==================== ERROR MANAGER ====================
class ErrorManager {
  constructor(listEl, countEl) {
    this.listEl = listEl;
    this.countEl = countEl;
    this.errors = [];
  }

  setErrors(errors) {
    this.errors = errors;
    this.render();
  }

  render() {
    this.listEl.innerHTML = '';
    this.countEl.textContent = this.errors.length;

    if (this.errors.length === 0) {
      this.countEl.classList.add('zero');
      this.countEl.classList.remove('nonzero');
    } else {
      this.countEl.classList.remove('zero');
    }

    for (const err of this.errors) {
      const item = document.createElement('div');
      item.className = 'error-item';
      item.innerHTML = `
        <span class="error-icon">⚠️</span>
        <span class="error-line-num">Linha ${err.line}</span>
        <span class="error-msg">${this.escapeHtml(err.message)}</span>
      `;
      item.onclick = () => {
        goToLine(err.line);
      };
      this.listEl.appendChild(item);
    }
  }

  escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
}

// ==================== SYNTAX HIGHLIGHTER ====================
class SyntaxHighlighter {
  constructor(overlayEl) {
    this.overlayEl = overlayEl;
  }

  highlight(tokens) {
    let html = '';
    for (const t of tokens) {
      const escaped = this.escapeHtml(t.value);
      switch (t.module) {
        case 'laranja':
          html += `<span style="color:var(--color-laranja);font-weight:600">${escaped}</span>`;
          break;
        case 'roxo':
          html += `<span style="color:var(--color-roxo)">${escaped}</span>`;
          break;
        case 'azul':
          html += `<span style="color:var(--color-azul)">${escaped}</span>`;
          break;
        case 'branco':
          html += `<span style="color:var(--color-branco)">${escaped}</span>`;
          break;
        case 'vermelho':
          html += `<span style="color:var(--color-vermelho);font-weight:600">${escaped}</span>`;
          break;
        case 'numero':
          html += `<span style="color:var(--color-numero)">${escaped}</span>`;
          break;
        case 'operador':
          html += `<span style="color:var(--color-operador)">${escaped}</span>`;
          break;
        case 'erro':
          html += `<span class="token-erro" style="color:var(--color-vermelho)">${escaped}</span>`;
          break;
        case 'paren':
        case 'virgula':
        case 'ponto':
        case 'dois_pontos':
          html += `<span style="color:var(--text-muted)">${escaped}</span>`;
          break;
        case 'string':
          html += `<span style="color:var(--color-string-hint)">${t.quote || '"'}${escaped}${t.quote || '"'}</span>`;
          break;
        case 'comentario':
          html += `<span style="color:var(--text-muted);font-style:italic">${escaped}</span>`;
          break;
        case 'newline':
          html += '\n';
          break;
        case 'ws':
          html += escaped;
          break;
        default:
          html += escaped;
      }
    }
    this.overlayEl.innerHTML = html;
  }

  escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
}

// ==================== UPDATE EDITOR ====================
function updateEditor() {
  updateLineNumbers();
  scheduleHighlight();
  scheduleSave();
}

function updateLineNumbers() {
  const lines = codeEditor.value.split('\n');
  lineNumbers.innerHTML = lines.map((_, i) => `<div>${i + 1}</div>`).join('');
}

function scheduleHighlight() {
  clearTimeout(highlightTimeout);
  highlightTimeout = setTimeout(() => {
    const source = codeEditor.value;
    const lexer = new Lexer(source);
    const { tokens, errors: lexErrors } = lexer.tokenize();
    
    // Highlight
    highlighter.highlight(tokens);

    // Parse for errors (pass declaredVars from lexer for accurate context)
    const parser = new Parser(tokens, new Set(lexer.declaredVars), new Set(lexer.declaredArrays), new Set(lexer.declaredObjects));
    const { ast, errors: parseErrors } = parser.parse();

    // Combine errors
    const allErrors = [...lexErrors, ...parseErrors];
    errorManager.setErrors(allErrors);
  }, 100);
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveCode, 500);
}

// ==================== SYNC SCROLL ====================
function syncScroll() {
  highlightOverlay.scrollTop = codeEditor.scrollTop;
  highlightOverlay.scrollLeft = codeEditor.scrollLeft;
  lineNumbers.scrollTop = codeEditor.scrollTop;
}

// ==================== RUN CODE ====================
async function runCode() {
  const source = codeEditor.value;
  
  // Flash button
  const btn = document.getElementById('btn-run');
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 400);

  // Lex
  const lexer = new Lexer(source);
  const { tokens, errors: lexErrors } = lexer.tokenize();

  // Parse
  const parser = new Parser(tokens, new Set(lexer.declaredVars), new Set(lexer.declaredArrays), new Set(lexer.declaredObjects));
  const { ast, errors: parseErrors } = parser.parse();

  // Update errors
  const allParseErrors = [...lexErrors, ...parseErrors];
  errorManager.setErrors(allParseErrors);

  // If there are critical errors, still try to run
  // Transpile — pass lexer's declaredVars for accurate identifier resolution
  const transpiler = new Transpiler(ast, new Set(lexer.declaredVars), new Set(lexer.declaredArrays), new Set(lexer.declaredObjects));
  const { code: jsCode, errors: transpileErrors } = transpiler.transpile();

  if (transpileErrors.length > 0) {
    errorManager.setErrors([...allParseErrors, ...transpileErrors]);
  }

  // Run in sandbox (async with timeout) — prepend CSV dataset variables
  const csvInjection = getCsvInjectionCode();
  const { output, error } = await runtime.runInSandbox(csvInjection + jsCode);

  if (error) {
    outputRenderer.render(output);
    outputRenderer.renderError(error);
  } else {
    outputRenderer.render(output);
  }

  // Switch to editor tab if not already
  if (!document.getElementById('editor-panel').classList.contains('active')) {
    switchTab('editor');
  }
}

// ==================== CLEAR OUTPUT ====================
function clearOutput() {
  outputRenderer.clear();
}

// ==================== GO TO LINE ====================
function goToLine(lineNum) {
  const lines = codeEditor.value.split('\n');
  let pos = 0;
  for (let i = 0; i < lineNum - 1 && i < lines.length; i++) {
    pos += lines[i].length + 1;
  }
  codeEditor.focus();
  codeEditor.setSelectionRange(pos, pos + (lines[lineNum - 1]?.length || 0));
  // Scroll the editor to the target line
  const lineHeight = parseFloat(getComputedStyle(codeEditor).lineHeight) || 22;
  codeEditor.scrollTop = (lineNum - 3) * lineHeight;
  syncScroll();
}

// ==================== CSV / DADOS SYSTEM ====================

const CSV_STORAGE_KEY = 'crabcode_csv_datasets';

function getCsvDatasets() {
  try { return JSON.parse(localStorage.getItem(CSV_STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
}

function saveCsvDatasets(datasets) {
  localStorage.setItem(CSV_STORAGE_KEY, JSON.stringify(datasets));
}

function generateCsvKey() {
  const vowels = 'aeiou';
  const consonants = 'bcdfghjklmnpqrstvwxyz';
  const existing = new Set(getCsvDatasets().map(d => d.key));
  let key, attempts = 0;
  do {
    // Generate pronounceable 4-letter key: CVCV pattern
    key = consonants[Math.floor(Math.random()*consonants.length)]
        + vowels[Math.floor(Math.random()*vowels.length)]
        + consonants[Math.floor(Math.random()*consonants.length)]
        + vowels[Math.floor(Math.random()*vowels.length)];
    attempts++;
  } while (existing.has(key) && attempts < 100);
  return key;
}

function parseCSV(raw) {
  // Split into lines, ignore completely empty trailing lines
  const lines = raw.split(/\r?\n/);
  while (lines.length && lines[lines.length-1].trim() === '') lines.pop();
  if (lines.length === 0) return { columns: [], error: 'CSV vazio.' };

  // Parse a single CSV line respecting quoted fields
  function parseLine(line) {
    const fields = [];
    let cur = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === ',' && !inQuote) { fields.push(cur); cur = ''; continue; }
      cur += ch;
    }
    fields.push(cur);
    return fields.map(f => f.trim());
  }

  const headers = parseLine(lines[0]);
  if (headers.length === 0) return { columns: [], error: 'Sem colunas.' };

  // Collect values per column
  const raw_cols = headers.map(() => []);
  for (let r = 1; r < lines.length; r++) {
    // Blank line mid-data → null for all columns (not skipped)
    if (lines[r].trim() === '') {
      headers.forEach((_, ci) => raw_cols[ci].push(''));
      continue;
    }
    const fields = parseLine(lines[r]);
    headers.forEach((_, ci) => {
      raw_cols[ci].push(fields[ci] !== undefined ? fields[ci] : '');
    });
  }

  // Build column objects with type inference
  const columns = headers.map((name, ci) => {
    const rawVals = raw_cols[ci];
    // Infer: if ALL non-empty values are numeric → number array
    const allNumeric = rawVals.every(v => v === '' || (!isNaN(parseFloat(v)) && isFinite(v)));
    const values = rawVals.map(v => {
      if (v === '') return null;
      return allNumeric ? parseFloat(v) : v;
    });
    return { name: name.replace(/\s+/g,'_'), original: name, type: allNumeric ? 'number' : 'string', values };
  });

  const dataRows = lines.slice(1).filter(l => l.trim() !== '').length;
  return { columns, rows: dataRows };
}

function csvColumnsToJs(dataset) {
  // Generates JS variable declarations for each column array
  return dataset.columns.map(col => {
    const vals = col.values.map(v => v === null ? 'null' : (col.type === 'number' ? v : `"${String(v).replace(/"/g,'\\"')}"`));
    return `var ${col.name} = [${vals.join(', ')}];`;
  }).join('\n');
}

function openCsvModal(existingKey) {
  const modal = document.getElementById('csv-modal');
  const keyInput = document.getElementById('csv-modal-key');
  const titleInput = document.getElementById('csv-modal-title');
  const contentInput = document.getElementById('csv-modal-content');
  const preview = document.getElementById('csv-modal-preview');

  if (existingKey) {
    const ds = getCsvDatasets().find(d => d.key === existingKey);
    if (ds) {
      keyInput.value = ds.key;
      titleInput.value = ds.title || '';
      contentInput.value = ds.raw;
      keyInput.dataset.editing = existingKey;
    }
  } else {
    keyInput.value = generateCsvKey();
    titleInput.value = '';
    contentInput.value = '';
    delete keyInput.dataset.editing;
  }
  preview.textContent = '';
  modal.style.display = 'flex';

  // Live preview on typing
  contentInput.oninput = () => updateCsvPreview();
  if (existingKey) updateCsvPreview();
}

function updateCsvPreview() {
  const raw = document.getElementById('csv-modal-content').value.trim();
  const preview = document.getElementById('csv-modal-preview');
  if (!raw) { preview.textContent = ''; return; }
  const result = parseCSV(raw);
  if (result.error) { preview.textContent = '⚠ ' + result.error; return; }
  const summary = result.columns.map(c =>
    `${c.name} [${c.type === 'number' ? '🔢' : '🔤'}] × ${c.values.length}`
  ).join('  ·  ');
  preview.textContent = `✓ ${result.columns.length} coluna(s), ${result.rows} linha(s) de dados:  ${summary}`;
  preview.style.color = 'var(--color-verde)';
}

function suggestCsvKey() {
  document.getElementById('csv-modal-key').value = generateCsvKey();
}

function closeCsvModal() {
  document.getElementById('csv-modal').style.display = 'none';
}

function saveCsvFromModal() {
  const key = document.getElementById('csv-modal-key').value.trim().replace(/\s+/g,'_');
  const title = document.getElementById('csv-modal-title').value.trim();
  const raw = document.getElementById('csv-modal-content').value.trim();
  const editingKey = document.getElementById('csv-modal-key').dataset.editing;

  if (!key) { alert('Defina uma key para o dataset.'); return; }
  if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(key)) { alert('Key inválida. Use apenas letras, números e _'); return; }
  if (!raw) { alert('Cole um CSV antes de salvar.'); return; }

  const parsed = parseCSV(raw);
  if (parsed.error) { alert('Erro no CSV: ' + parsed.error); return; }

  let datasets = getCsvDatasets();
  // Remove existing if editing or same key
  datasets = datasets.filter(d => d.key !== (editingKey || key));

  datasets.push({ key, title, raw, columns: parsed.columns, rows: parsed.rows, createdAt: Date.now() });
  saveCsvDatasets(datasets);
  closeCsvModal();
  renderCsvList();
}

function deleteCsvDataset(key) {
  if (!confirm(`Remover dataset "${key}"?`)) return;
  const datasets = getCsvDatasets().filter(d => d.key !== key);
  saveCsvDatasets(datasets);
  renderCsvList();
}

function copyCsvImport(key, btn) {
  navigator.clipboard.writeText(`importe ${key}`).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = orig, 1400);
  });
}

function renderCsvList() {
  const container = document.getElementById('dados-list');
  const datasets = getCsvDatasets();

  if (datasets.length === 0) {
    container.innerHTML = `<div class="csv-empty">
      <div style="font-size:32px;margin-bottom:12px">📊</div>
      <div>Nenhum dataset ainda.</div>
      <div style="margin-top:6px;font-size:13px">Clique em <strong>＋ Novo CSV</strong> para importar dados.</div>
    </div>`;
    return;
  }

  container.innerHTML = datasets.map(ds => {
    const colBadges = ds.columns.map(c =>
      `<span title="${c.type === 'number' ? 'numérico' : 'texto'}">${c.original} ${c.type === 'number' ? '🔢' : '🔤'}</span>`
    ).join('');
    return `<div class="csv-card">
      <div class="csv-card-header">
        <span class="csv-card-key">${ds.key}</span>
        <span class="csv-card-title">${ds.title || '—'}</span>
        <span style="font-size:11px;color:var(--text-muted)">${ds.columns.length} col · ${ds.rows} linha(s)</span>
      </div>
      <div class="csv-card-cols">${colBadges}</div>
      <div class="csv-card-actions">
        <button class="btn" style="font-size:12px;padding:4px 10px" onclick="copyCsvImport('${ds.key}', this)">📋 importe ${ds.key}</button>
        <button class="btn" style="font-size:12px;padding:4px 10px" onclick="openCsvModal('${ds.key}')">✏️ Editar</button>
        <button class="btn" style="font-size:12px;padding:4px 10px;color:var(--color-vermelho)" onclick="deleteCsvDataset('${ds.key}')">🗑 Remover</button>
      </div>
    </div>`;
  }).join('');
}

// Inject CSV datasets into runtime as JS before user code runs
function getCsvInjectionCode() {
  const source = typeof codeEditor !== 'undefined' ? codeEditor.value : '';
  const importPattern = /importe\s+(\w+)/g;
  const datasets = getCsvDatasets();
  const datasetMap = Object.fromEntries(datasets.map(d => [d.key, d]));
  let injection = '';
  let m;
  while ((m = importPattern.exec(source)) !== null) {
    const key = m[1];
    if (datasetMap[key]) {
      injection += `// Dataset: ${key}\n` + csvColumnsToJs(datasetMap[key]) + '\n';
    }
  }
  return injection;
}

// ==================== RESIZE HANDLE ====================
function initResize() {
  const handle = document.getElementById('resize-handle');
  const editorPanel = document.getElementById('editor-panel');
  const outputPanel = document.getElementById('output-panel');
  const main = document.getElementById('main');
  let isResizing = false;

  handle.addEventListener('mousedown', (e) => {
    isResizing = true;
    handle.classList.add('active');
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const rect = main.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = (x / rect.width) * 100;
    if (pct > 20 && pct < 80) {
      editorPanel.style.flex = `0 0 ${pct}%`;
      outputPanel.style.width = `${100 - pct}%`;
      outputPanel.style.flex = 'none';
    }
  });

  document.addEventListener('mouseup', () => {
    isResizing = false;
    handle.classList.remove('active');
  });
}

// ==================== KEYBOARD SHORTCUTS ====================
function initShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Ctrl+Enter = Run
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      runCode();
    }
    // Ctrl+S = Save
    if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      saveCode();
    }
    // Ctrl+L = Clear output
    if (e.ctrlKey && e.key === 'l') {
      e.preventDefault();
      clearOutput();
    }
  });

  // Tab key in editor
  codeEditor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      // If autocomplete is active, let the AutoComplete handler manage Tab
      if (AutoComplete && AutoComplete.active) return;
      e.preventDefault();
      const start = codeEditor.selectionStart;
      const end = codeEditor.selectionEnd;
      codeEditor.value = codeEditor.value.substring(0, start) + '  ' + codeEditor.value.substring(end);
      codeEditor.selectionStart = codeEditor.selectionEnd = start + 2;
      updateEditor();
    }
  });
}

// ==================== TUTORIAL CONTENT ====================
function copyCode(btn) {
  const box = btn.closest('.example-box, .solution-content');
  const pre = box.querySelector('pre');
  if (!pre) return;
  const text = pre.textContent;

  const done = () => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1500);
  };

  function fallback() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); done(); } catch(e) {}
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else {
    fallback();
  }
}

      <h1 style="border-top: 2px solid var(--color-verde); padding-top: 20px; margin-top: 40px;">Unidade 4 — Monte Carlo e Análise de Risco</h1>
      <p>Aprenda a usar loops de controle preciso, simulações com amostragem massiva e ferramentas estatísticas para modelar incerteza, calcular percentis e construir análises de risco completas ao estilo Monte Carlo.</p>

      <!-- LIÇÃO 28 -->
      <h2>Lição 28: Loops Complexos — Controle Total com <code>loop</code></h2>
      <p>O comando <code>loop</code> dá controle explícito sobre início, condição de parada e incremento — como um <code>for</code> clássico. A variável de índice é <code>i</code>, injetada automaticamente. O corpo aceita múltiplas ações na mesma linha (igual ao corpo de <code>funcao</code>).</p>

      </div>

execute loop(1, i <= 10, i + 1) altere soma para soma + i

      </div>

apresente "Produto (5!)" em destaque

      <div class="warning">O incremento é uma <strong>expressão</strong>, não um comando: escreva <code>i + 1</code> (não <code>i++</code>). O CrabCode calcula o novo valor de <code>i</code> automaticamente a cada iteração.</div>

      <div class="warning">Cada amostra é <strong>reavaliada independentemente</strong> — a expressão é re-executada do zero a cada iteração. Isso garante aleatoriedade real: 1000 amostras de <code>aleatorio entre 1 e 6</code> gera 1000 valores diferentes.</div>

      <p>Até aqui você aprendeu a programar do zero usando os comandos nativos do CrabCode. Agora é hora de turbinar seus programas — o CrabCode possui <strong>mais de 80 bibliotecas oficiais</strong> com centenas de funções prontas para usar. Nesta unidade você vai aprender a importar, explorar, combinar e até criar as suas próprias bibliotecas.</p>

      <!-- LIÇÃO 35 -->
      <h2>Lição 35: Importe — Adicionando Superpoderes</h2>
      <p>O comando <code>importe</code> carrega uma biblioteca e disponibiliza todas as suas funções no programa. É simples: uma linha, uma biblioteca.</p>
      <div class="example-box">
        <button class="copy-btn" onclick="copyCode(this)">Copiar</button>
        <div class="example-label">Exemplo</div>
        <pre>importe matematica

# Agora todas as funções de matematica estão disponíveis
execute fatorial(10)          # → 3628800
execute fibonacci(15)         # → 610
execute mdc(48, 18)           # → 6
execute seno(3.14159 / 2)     # → ≈ 1
apresente pi_const em destaque</pre>
      </div>
      <p>Cada biblioteca exporta um conjunto de funções. Após o <code>importe</code>, essas funções ficam acessíveis como se fossem parte da linguagem. Sem o <code>importe</code>, chamar uma dessas funções gera erro de <em>variável não declarada</em>.</p>
      <div class="tip">O <code>importe</code> é <strong>silencioso</strong> — nenhuma mensagem aparece no output. Se a biblioteca não existir, um erro aparece no painel de erros do editor.</div>
      <div class="example-box">
        <button class="copy-btn" onclick="copyCode(this)">Copiar</button>
        <div class="example-label">Importando múltiplas bibliotecas</div>
        <pre>importe matematica
importe texto
importe conversoes

# Combinando funções de libs diferentes
defina temp_celsius como 36.5
defina temp_fahr como rodar(execute celsius_para_fahrenheit(temp_celsius))

apresente "🌡️ Temperatura Corporal" em destaque
execute temp_celsius
execute temp_fahr
execute capitalizar(normal)</pre>
      </div>
      <div class="warning">Cada <code>importe</code> deve estar em sua própria linha, no topo do programa (antes de usar as funções). Não há limite de quantas bibliotecas você pode importar.</div>

      <!-- ═══════════════════════════════════════════════════════════════ -->
      <h2 id="visao-geral">1. Visão Geral e Filosofia</h2>
      <p><strong>CrabCode</strong> é uma <em>Domain Specific Language</em> (DSL) em português brasileiro, projetada para ambiente educacional e prototipação rápida de cálculos. Transpila para JavaScript e executa no browser em tempo real.</p>
      <p>Princípios de design:</p>

      </ul>

      <!-- ═══════════════════════════════════════════════════════════════ -->
      <h2 id="arquitetura">2. Arquitetura do Interpretador</h2>
      <p>O pipeline de execução compreende cinco estágios sequenciais:</p>

        <tr><td>2. Análise Sintática</td><td><code>Parser</code></td><td>Tokens</td><td>AST</td><td>Construção da árvore sintática, validação de estrutura</td></tr>
        <tr><td>3. Transpilação</td><td><code>Transpiler</code></td><td>AST</td><td>Código JS</td><td>Geração de JavaScript, injeção de bibliotecas, pré-passe de declarações</td></tr>
        <tr><td>4. Execução</td><td><code>Runtime</code></td><td>Código JS</td><td>Array de output</td><td>Avaliação via <code>new Function()</code>, captura de resultados</td></tr>
        <tr><td>5. Renderização</td><td><code>OutputRenderer</code></td><td>Array de output</td><td>DOM</td><td>Renderização visual: texto, tabelas, gráficos, notação científica</td></tr>
      </table>
      <div class="tip"><strong>Pré-passe do Transpiler:</strong> Antes de gerar código, o Transpiler percorre a AST inteira e registra todos os nomes declarados com <code>defina</code>. Isso permite que funções sejam chamadas antes de serem declaradas no código-fonte (hoisting de funções).</div>

      <h2 id="modulos-visuais">3. Sistema de Módulos Visuais</h2>

      <h3><span class="badge-laranja module-badge">MÓDULO LARANJA</span> — Comandos Primários</h3>
      <p>Toda linha deve iniciar com exatamente um destes. São o ponto de entrada obrigatório de qualquer instrução.</p>
      <table>
        <tr><th>Comando</th><th>Função</th><th>Sintaxe</th></tr>
        <tr><td><code>defina</code></td><td>Declaração</td><td><code>defina NOME como VALOR</code></td></tr>
        <tr><td><code>altere</code></td><td>Mutação</td><td><code>altere NOME para EXPR [relatando[(N)]] [enquanto COND]</code></td></tr>
        <tr><td><code>execute</code></td><td>Output console</td><td><code>execute EXPR [se COND [senao EXPR2]] [repita N vezes]</code></td></tr>

      <h3><span class="badge-roxo module-badge">MÓDULO ROXO</span> — Comandos Secundários</h3>

      </table>

      <h3><span class="badge-vermelho module-badge">MÓDULO VERMELHO</span> — rodar()</h3>
      <p><code>rodar(execute ...)</code> permite compor expressões — embute um <code>execute</code> onde um valor é esperado.</p>

      <!-- ═══════════════════════════════════════════════════════════════ -->
      <h2 id="tipos">4. Sistema de Tipos</h2>

      <h3>4.1 Números</h3>
      <p>Inteiros ou decimais com separador ponto (<code>.</code>). Operadores: <code>+ - * /</code>. Comparadores: <code>&gt; &lt; = != &gt;= &lt;=</code>. O operador <code>=</code> significa igualdade (<code>===</code> em JS), nunca atribuição.</p>

      <h3>4.2 Strings</h3>
      <p><strong>Implícita:</strong> palavras não declaradas viram string automaticamente, agrupadas até encontrar token reconhecido. <strong>Explícita:</strong> delimitada por aspas simples ou duplas — aceita qualquer caractere exceto a aspa delimitadora.</p>
      <div class="example-box"><pre>defina nome como João Silva          # implícita
defina preco como "R$ 49,90"         # explícita — vírgula exige aspas
defina reservada como "execute isso" # aspas protegem keyword</pre></div>

      <h3>4.3 Arrays</h3>
      <p>Valores separados por vírgula. Indexação <strong>base 1</strong>: <code>lista(1)</code> retorna o primeiro elemento.</p>
      <div class="example-box"><pre>defina notas como 8.5, 7.0, 9.2, 6.8
execute notas(1)    # → 8.5
execute notas(4)    # → 6.8</pre></div>
      <div class="warning">Acesso fora dos limites retorna <code>undefined</code> silenciosamente.</div>

      <h3>4.4 Objetos</h3>
      <p>Declarados com <code>objeto</code> + pares <code>chave: valor</code>. Acesso via <code>obj.chave</code>.</p>
      <div class="example-box"><pre>defina p como objeto nome: "Notebook", preco: 3500, desconto: 0.1
execute p.nome       # → Notebook
execute p.preco      # → 3500</pre></div>
      <p><strong>objeto de</strong> — cria objeto por zip de dois arrays:</p>
      <div class="example-box"><pre>defina meses como jan, fev, mar
defina valores como 100, 200, 150
defina rel como objeto de meses: valores
# rel = { jan: 100, fev: 200, mar: 150 }</pre></div>
      <p><strong>tendencia de</strong> — regressão linear sobre os valores de um objeto:</p>
      <div class="example-box"><pre>defina trend como tendencia de rel
apresente rel em grafico(trend)   # dados vs tendência</pre></div>

      <h3>4.5 Funções</h3>
      <p>Declaradas com <code>funcao(params)</code>. O corpo vem na mesma linha. O resultado é o último <code>execute</code>.</p>
      <div class="example-box"><pre>defina dobro como funcao(x) execute x * 2
defina imc como funcao(p, a) execute p / (a * a)
defina sort como funcao execute aleatorio entre 1 e 6
execute dobro(21)    # → 42
execute imc(78, 1.75) # → 25.47...</pre></div>
      <div class="warning">Funções não suportam recursão direta. Funções podem ser chamadas antes de serem declaradas (hoisting).</div>

      <!-- ═══════════════════════════════════════════════════════════════ -->
      <h2 id="comandos">5. Comandos da Linguagem</h2>

      <h3>5.1 defina — Declaração</h3>
      <p>Cria variável no escopo global. Só pode ser chamado uma vez por nome.</p>
      <table>
        <tr><th>Forma</th><th>Tipo criado</th><th>JS equivalente</th></tr>
        <tr><td><code>defina x como 42</code></td><td>Número</td><td><code>let x = 42;</code></td></tr>
        <tr><td><code>defina s como "texto"</code></td><td>String explícita</td><td><code>let s = "texto";</code></td></tr>
        <tr><td><code>defina s como palavras</code></td><td>String implícita</td><td><code>let s = "palavras";</code></td></tr>
        <tr><td><code>defina a como 1, 2, 3</code></td><td>Array (base-1)</td><td><code>let a = [1, 2, 3];</code></td></tr>
        <tr><td><code>defina o como objeto k: v</code></td><td>Objeto</td><td><code>let o = { k: v };</code></td></tr>
        <tr><td><code>defina o como objeto de K: V</code></td><td>Objeto de arrays</td><td><code>Object.fromEntries(zip(K,V))</code></td></tr>
        <tr><td><code>defina t como tendencia de O</code></td><td>Objeto de tendência</td><td>Regressão linear → objeto</td></tr>
        <tr><td><code>defina f como funcao(x) ...</code></td><td>Função</td><td><code>function f(x){ ... }</code></td></tr>
        <tr><td><code>defina c como compactar ARR</code></td><td>Número</td><td>Soma de todos os valores numéricos</td></tr>
        <tr><td><code>defina v como rodar(...)</code></td><td>Dinâmico</td><td>Resultado de expressão embutida</td></tr>
      </table>

      <h3>5.2 altere — Mutação</h3>
      <p>Muda o valor de variável existente. A variável deve ter sido declarada com <code>defina</code>.</p>
      <table>
        <tr><th>Sintaxe</th><th>Comportamento</th></tr>
        <tr><td><code>altere V para EXPR</code></td><td>Atribuição simples</td></tr>
        <tr><td><code>altere V para EXPR relatando</code></td><td>Atribui e loga uma vez</td></tr>
        <tr><td><code>altere V para EXPR relatando(N)</code></td><td>Repete N vezes, logando cada resultado</td></tr>
        <tr><td><code>altere V para EXPR enquanto COND</code></td><td>Loop while silencioso</td></tr>
        <tr><td><code>altere V para EXPR relatando enquanto COND</code></td><td>Loop while com log a cada passo</td></tr>
      </table>
      <div class="warning"><strong>Guard de segurança:</strong> <code>enquanto</code> tem limite de 10.000 iterações. Se excedido, o loop para automaticamente.</div>

      <h3>5.3 execute — Output Console</h3>
      <p>Avalia expressão e envia resultado ao painel de output.</p>
      <table>
        <tr><th>Forma</th><th>Comportamento</th></tr>
        <tr><td><code>execute EXPR</code></td><td>Avalia e exibe</td></tr>
        <tr><td><code>execute EXPR se COND</code></td><td>Condicional</td></tr>
        <tr><td><code>execute EXPR se COND senao EXPR2</code></td><td>Condicional com alternativa</td></tr>
        <tr><td><code>execute EXPR repita N vezes</code></td><td>N execuções (reavalia a cada iteração)</td></tr>
        <tr><td><code>execute potencia de B, E</code></td><td>B^E</td></tr>
        <tr><td><code>execute raiz de N</code></td><td>√N</td></tr>
        <tr><td><code>execute aleatorio entre MIN e MAX</code></td><td>Inteiro aleatório [MIN, MAX]</td></tr>
        <tr><td><code>execute juros compostos(taxa, n)</code></td><td>(1+taxa)^n</td></tr>
        <tr><td><code>execute juros compostos(taxa, n, M)</code></td><td>M × (1+taxa)^n</td></tr>
        <tr><td><code>execute loop(I, COND, INCR) CORPO</code></td><td>Loop for explícito (variável <code>i</code>)</td></tr>
        <tr><td><code>execute EXPR com N amostras</code></td><td>Array com N avaliações</td></tr>
        <tr><td><code>execute percentil de DADOS, P</code></td><td>Percentil P (0–100)</td></tr>
        <tr><td><code>execute tamanho de DADOS</code></td><td>Contagem de elementos</td></tr>
      </table>

      <h3>5.4 apresente — Output Visual</h3>
      <table>
        <tr><th>Formato</th><th>Visual</th><th>Ideal para</th></tr>
        <tr><td><code>em texto</code></td><td>Parágrafo simples</td><td>Descrições, corpo de relatório</td></tr>
        <tr><td><code>em destaque</code></td><td>Caixa com borda roxa</td><td>Títulos, alertas, resultados</td></tr>
        <tr><td><code>em apresentação</code></td><td>Linha label → valor</td><td>Métricas, KPIs</td></tr>

      <h2 id="rodar">6. Composição com rodar()</h2>
      <p><code>rodar(execute ...)</code> embute um <code>execute</code> onde um valor é esperado. É o único mecanismo de composição vertical.</p>
      <table>
        <tr><th>Contexto</th><th>Exemplo</th></tr>
        <tr><td>Valor de apresente</td><td><code>apresente rodar(execute fn(x)) em destaque</code></td></tr>
        <tr><td>Valor de defina</td><td><code>defina v como rodar(execute aleatorio entre 1 e 10)</code></td></tr>
        <tr><td>Dentro de expressão</td><td><code>execute x + rodar(execute dobrar(x))</code></td></tr>
        <tr><td>Índice de array</td><td><code>execute lista(rodar(execute aleatorio entre 1 e 5))</code></td></tr>
        <tr><td>Aninhado</td><td><code>rodar(execute fn(rodar(execute aleatorio entre 1 e 10)))</code></td></tr>
      </table>

      <h2 id="visualizacoes">7. Formatos de Visualização</h2>

      <h3>7.1 tabela e grafico</h3>
      <p>Consomem objetos e geram visualizações. O objeto em <code>apresente</code> é a série principal; o objeto nos parênteses é a série de comparação.</p>
      <div class="example-box"><pre>defina meses como jan, fev, mar, abr, mai, jun
defina vendas como 120, 95, 140, 110, 130, 160
defina rel como objeto de meses: vendas
defina trend como tendencia de rel

apresente rel em tabela
apresente rel em grafico(trend)
apresente rel em estatisticas</pre></div>

      <h3>7.2 estatisticas</h3>
      <p>Exibe 4 métricas: média, mediana, moda e desvio padrão amostral (N-1). Requer objeto com valores numéricos.</p>

      <h3>7.3 cientifica</h3>
      <p>Decompõe número em mantissa × 10ⁿ com 2 casas decimais e superscript Unicode.</p>
      <div class="example-box"><pre>apresente 299792458 em cientifica    # → 2.99 × 10⁸
apresente 0.000045 em cientifica     # → 4.5 × 10⁻⁵</pre></div>
